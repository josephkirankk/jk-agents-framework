    GenerateResponseResponse:
      type: object
      title: GenerateResponseResponse
      properties:
        response:
          type: string
          example:
            - |-
              Subject Line: "Exclusive: Discover PepsiCo's New, Healthy and Refreshing Beverage Options Just for You!"

              ---

              Hello [Customer's Name],

              We trust this message finds you well and in good spirits. At PepsiCo, we believe in the power of joy - the joy that comes from savoring a flavorful drink that not only quenches your thirst but also satisfies your pursuit for a healthy lifestyle. Our line of beverage options does just that and we're incredibly eager to share
        prompt:
          type: string
          example:
            - |-
              generate an email template to significantly enhance customer outreach for pepsico's beverage products. the intended audience is diverse, encompassing health-conscious consumers seeking refreshing beverage options. the communication tone should be both informative and inclusive.

              1. suggest an attention-grabbing subject line that not only boosts email open rates but also sparks curiosity and interest among recipients.
              2. develop the main body of the email with a focus on highlighting the health benefits, unique flavor offerings, and the convenient availability of pepsico products in local stores. craft the content to resonate strongly with a broad consumer base, ensuring inclusivity in the messaging.
        functions:
          type: array
          description: |
            If no tool call is made by the model, the answer will contain an empty array.
          items:
            type: object
            properties:
              arguments:
                type: object
                description: |
                  The arguments to be passed to the function that was recognized to be called by the model.
                example:
                  - prompt: 'Generate an image of a dog floating in space. The dog is trying to catch a bright, multi-colored ball that is also floating. The background should depict a vast, starry expanse of space. The dog should be of a breed like a Golden Retriever or a Labrador and be in a playful, energetic pose. The ball should be glowing and reflect off the dog''s eager, anticipating eyes.'
              name:
                type: string
                description: |
                  The name of the function that was recognized to be called by the model.
                example:
                  - my_function
      required:
