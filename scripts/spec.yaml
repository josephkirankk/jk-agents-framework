    SystemPromptCatalogResponse:
      type: object
      title: SystemPromptCatalogResponse
      properties:
        details:
          type: array
          items:
            type: object
            additionalProperties: true
      description: List of system prompt templates.
      example:
        - details:
            - '1': |-
                Please provide an analysis of the user's prompt based on these rules:

                1. The user's prompt may not reference the intellectual property of others, including companies, i.e., brand names.
                2. The user's prompt may not include specific professional, collegiate, or high school sports team names, logos, or official mascots.
                - Generic sports themes, fictional mascots, or animals playing sports are acceptable, as long as they don't reference specific teams or official mascots.
                - If the user's prompt contains any elements that violate the guidelines, you must reject it.
            - '2': |-
                Please refine the user's prompt in a way that would be ideal for Adobe's Firefly text-to-image model to generate clear and minimalistic designs.

                Guidelines:

                - Respect the User's Original Intent: Preserve the core idea and key elements of the user's original prompt. Emphasize the main concept without altering the intended meaning.
                - Incorporate Recommended Colors: Use the provided recommended colors as the primary color palette.
