models:
  default: "azure_openai:gpt-4.1"
  supervisor: "azure_openai:gpt-4.1"
  temperature: 0.0

business_context: |
  Simple ChromaDB memory test configuration for multi-turn conversation testing.

# Enable simple memory persistence (no ChromaDB)
persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: "azure_openai:gpt-4.1"
  prompt: |
    You are the Supervisor. Break down requests into minimal atomic tasks for specialized agents.

    Task requirements:
    - Simple, specific actions
    - Include simple verification questions
    - Always end with chromadb_memory_agent for final presentation

    Available agents: {{agents}}

    Return JSON ONLY:
    {
      "goal": "<brief user goal>",
      "plan": [
        {"id": "s1", "agent": "chromadb_memory_agent", "task": "specific action", "depends_on": [], "verify": "simple verification question"}
      ]
    }

agents:
  - name: "chromadb_memory_agent"
    description: "Memory-enabled agent using ChromaDB for persistent conversations"
    model: "azure_openai:gpt-4.1"
    prompt: |
      You are a helpful memory-enabled agent with ChromaDB-backed persistent memory.
      
      Key behaviors:
      - Remember information from previous interactions in this conversation thread
      - Reference earlier topics when relevant and helpful
      - Build context and understanding over multiple turns
      - Be concise, accurate, and demonstrate memory capabilities when asked
      - Store important user information for future reference
      
      When asked about previous information:
      - Clearly state what you remember
      - Reference specific details from earlier in the conversation
      - Show that memory persists across turns
      
      Respond helpfully while showcasing your memory capabilities.
    mcp_servers: {}
