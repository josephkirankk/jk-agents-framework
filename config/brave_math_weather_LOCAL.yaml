models:
  # Use LM Studio (OpenAI-compatible) Gemma model
  # openai:openai/gpt-oss-20b
  default: "openai:google/gemma-3n-e4b"
  supervisor: "openai:google/gemma-3n-e4b"
  temperature: 0.0

business_context: |
  You are a multi-agent system who will always use the most appropriate agent for the task at hand.
  Rules :
    - Do not include unnecessary steps.
    - Verify the step based on exactly what is requested in the step.
    - Only answer the latest question ask by the user. treat other information as context.

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: ""
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}

    You are the Supervisor/Planner. Decompose the user's request into a minimal sequence of steps.

    Always use Human responder as the final step to write a human readable response.

    Use the appropriate agents from this list:
    {{agents}}

    Return JSON only with the structure:
    {
      "goal": "<short goal>",
      "plan": [
        {"id":"s1", "agent":"search_agent", "task":"...", "depends_on":[], "verify":"..."},
        {"id":"s2", "agent":"math_agent", "task":"...", "depends_on":["s1"], "verify":"..."}
      ]
    }

agents:
  - name: "search_agent"
    description: "Brave web search via MCP SSE"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      You are SearchAgent. Use the Brave MCP server to search and summarize.
      Always:
      - Provide accurate, up-to-date info
      - Include 2-3 key sources as URLs
      - Keep it concise
      Available MCP servers:
      {{mcpservers}}
    mcp_servers:
      brave:
        description: "Brave search MCP server (SSE)"
        transport: "sse"
        url: "http://localhost:8080/sse"

  - name: "human_response_agent"
    description: "Human responder"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      Understand the full user request and multistep responses and provide a final response which is consistent with the user request.

      Rules:
      - Return only the final human response, nothing else
      - Only include citations [1], [2] if actual URLs were provided in previous steps
      - Do not add placeholder citations without real sources
    mcp_servers: {}

  - name: "math_agent"
    description: "Compute numbers precisely using math HTTP endpoint"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      You are MathAgent. Use the calc HTTP tool for arithmetic with single expressions.

      Rules:
      - Use single expression format (e.g., "34 - 30" or "max(34, 30)")
      - For temperature comparisons, calculate the difference to determine which is higher
      - Return the comparison result with explanation
      - Example: "Delhi is hotter. Temperature difference: 4°C (34°C - 30°C = 4°C)"
    mcp_servers: {}
    http_tools:
      calc:
        description: "Calculate arithmetic expression"
        method: GET
        url: "http://localhost:8001/calculate"
        params:
          - name: expression
            in: query
        response_path: result

  - name: "weather_agent"
    description: "Get current weather from local FastAPI weather server"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      You are WeatherAgent. Use the weather HTTP tool to get the weather by city.
      Return: "City: temp C, condition" or an error message.
    mcp_servers: {}
    http_tools:
      weather:
        description: "Get weather for a city"
        method: GET
        url: "http://localhost:8002/weather"
        params:
          - name: city
            in: query

  - name: "python_exec_agent"
    description: "Writes small Python snippets and executes them via an MCP Python runner"
    model: "openai:gpt-4o-mini"
    prompt: |
      You are CodeRunner. You MUST write and execute Python code using the run_python_code tool for any computational task.

      CRITICAL RULES:
      - ALWAYS use the run_python_code tool - never just describe what you would do
      - Write the Python code first, then execute it using the tool
      - Show both the code (```python ... ```) and the actual execution result
      - Use previous step data as input when appropriate
      - Prefer standard library, avoid network or file side effects
      - If execution fails, fix the code and retry once

      Available MCP servers: {{mcpservers}}

      Remember: You must actually execute the code using the available tool, not just pretend to do it!
    mcp_servers:
      python_runner:
        description: "Run Python code via Deno + @pydantic/mcp-run-python (stdio)"
        transport: "stdio"
        command: "deno"
        args:
          - "run"
          - "-N"
          - "-R=node_modules"
          - "-W=node_modules"
          - "--node-modules-dir=auto"
          - "jsr:@pydantic/mcp-run-python"
          - "stdio"