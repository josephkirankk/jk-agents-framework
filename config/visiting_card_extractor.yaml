# =============================================================================
# JK Agents Framework - Visiting Card Extraction System
# =============================================================================
# Production-ready multi-agent system for extracting structured data from
# visiting cards using multimodal vision AI and web research
# =============================================================================

version: "1.1"
name: "visiting_card_extractor_v1"

models:
  default: "azure_openai:gpt-4.1"          # Reliable model for structured extraction
  multimodal: "azure_openai:gpt-4o"         # GPT-4o has excellent multimodal vision
  research: "azure_openai:gpt-4.1"         # Company research and verification
  temperature: 0.03                         # Low temperature for precise extraction
  fallback: "openai:gpt-4o-mini"           # Backup model

business_context: |
  **VISITING CARD DATA EXTRACTION SYSTEM**
 
  Extract accurate contact information from visiting card images with a **high-performance,
  image-only pipeline**. Run the fastest possible OCR and normalization steps first, and only
  add external research if the user explicitly requests company background data.
 
  **CORE PRINCIPLES:**
  - Extract all visible text and logos from card images using multimodal vision
  - Normalize contact data (phones to E.164, emails validated, URLs cleaned)
  - Prioritize low-latency processing and avoid extra steps that are not requested
  - Provide confidence scores and source provenance for all extracted data
  - Output structured JSON following the canonical schema
  
  **EXTRACTION CONTEXT:**
  - Session: {{timestamp}} ({{day_name}}, {{date_long}})
  - Platform: {{platform}}
  - Quality Standards: High-precision extraction with source attribution

# Conversation memory enabled for context across multiple extractions
conversation_memory:
  enabled: true
  max_conversations: 5
  max_context_length: 2000  
  
  
# High-performance settings for image processing
persistence:
  type: "chromadb"

resource_limits:
  max_memory_mb: 3072
  max_connections: 50
  scale_up_cpu_threshold: 70.0
  scale_down_cpu_threshold: 20.0

temperature: 0.03

# Optimized timeouts for different task complexities
timeouts:
  ocr_processing: 45      # Multimodal vision processing
  data_normalization: 25  # Contact data parsing and validation
  company_research: 90    # Brave Search web research (can be slow)
  data_aggregation: 20    # Final JSON assembly
  overall_request_timeout_seconds: 180

supervisor:
  name: "vc_extraction_coordinator"
  model: "azure_openai:gpt-4.1"
  prompt: |
    You are the Visiting Card Extraction Coordinator.
    
    **COORDINATION MISSION:**
    {{business_context}}
    
    **AVAILABLE AGENTS:**
    {{agents}}
    
    **USER REQUEST:**
    {{original_user_question}}
    
    **CRITICAL: CHECK FOR IMAGES FIRST**
    
    Before designing any extraction plan, you MUST verify:
    - Does the user request mention extracting from an image/card?
    - If YES: You should assume images might not be uploaded yet
    - Your response should FIRST ask the user to upload the visiting card image(s)
    
    **IF NO IMAGES ARE AVAILABLE:**
    Respond with:
    ```
    {"goal": "Request image upload", "message": "Please upload the visiting card image(s) you want to extract data from. You can upload one or more images (front/back of card). Once uploaded, I will extract all contact details, company information, and perform comprehensive research.", "plan": []}
    ```
    
    **WORKFLOW DESIGN (PRIORITIZE HIGH-PERFORMANCE IMAGE PIPELINE):**
    
    Only create an extraction plan if images are confirmed to be available.
    Default to the fastest possible sequence:
    1. **OCR & Vision Analysis**: Extract text, logos, and layout from card image(s)
    2. **Data Normalization**: Parse and validate contact fields (phones, emails, URLs)
    3. **Data Aggregation**: Produce the final JSON output immediately after normalization
    
    **ADD COMPANY RESEARCH ONLY WHEN REQUESTED:**
    - Include a research step **only** if the user explicitly asks for company background, web research, validation beyond the card, or if the prompt clearly requires external data.
    - If the user does not request research, skip it to maintain the fastest turnaround time.
    
    **EXECUTION PLAN STRUCTURE:**
    
    **High-Performance Extraction (default 3-step plan):**
    
    {
      "goal": "Extract visiting card contact data quickly",
      "extraction_strategy": "High-performance: OCR → Normalize → Aggregate",
      "plan": [
        {
          "id": "ocr_extraction",
          "agent": "multimodal_ocr_agent",
          "task": "Analyze card image(s) using multimodal vision. Extract ALL text blocks, detect logos, capture layout. Return OCR data with confidence scores and bounding boxes.",
          "depends_on": [],
          "verify": "Confirm OCR data extracted with text blocks, logos, and confidence scores",
          "timeout_seconds": 45,
          "retry": 1
        },
        {
          "id": "contact_normalization",
          "agent": "contact_parser_agent",
          "task": "Parse OCR data and extract contact fields. Normalize phones to E.164, validate emails, parse URLs, identify company name candidates. Use normalization tools.",
          "depends_on": ["ocr_extraction"],
          "verify": "Confirm contact data normalized with confidence scores",
          "timeout_seconds": 25,
          "retry": 1
        },
        {
          "id": "data_aggregation",
          "agent": "aggregator_agent",
          "task": "Combine OCR data and normalized contact info into final visiting_card_output JSON. Validate schema compliance.",
          "depends_on": ["contact_normalization"],
          "verify": "Confirm final JSON output matches schema",
          "timeout_seconds": 20,
          "retry": 0
        }
      ]
    }
    
    **Extended Extraction (include research only when explicitly required):**
    
    {
      "goal": "Extract complete visiting card data with company research",
      "extraction_strategy": "Extended: OCR → Normalize → Research → Aggregate",
      "plan": [
        {
          "id": "ocr_extraction",
          "agent": "multimodal_ocr_agent",
          "task": "Analyze card image(s) using multimodal vision. Extract ALL text blocks, detect logos, capture layout. Return OCR data with confidence scores and bounding boxes.",
          "depends_on": [],
          "verify": "Confirm OCR data extracted with text blocks, logos, and confidence scores",
          "timeout_seconds": 45,
          "retry": 1
        },
        {
          "id": "contact_normalization",
          "agent": "contact_parser_agent",
          "task": "Parse OCR data and extract contact fields. Normalize phones to E.164, validate emails, parse URLs, identify company name candidates. Use normalization tools.",
          "depends_on": ["ocr_extraction"],
          "verify": "Confirm contact data normalized with confidence scores",
          "timeout_seconds": 25,
          "retry": 1
        },
        {
          "id": "company_research",
          "agent": "company_research_agent",
          "task": "Research company using Brave Search. Find official website, founding info, employee count, revenue, business description, and reviews. Provide sources for all facts.",
          "depends_on": ["contact_normalization"],
          "verify": "Confirm company research completed with authoritative sources",
          "timeout_seconds": 90,
          "retry": 2
        },
        {
          "id": "data_aggregation",
          "agent": "aggregator_agent",
          "task": "Combine OCR data, normalized contact info, and company research into final visiting_card_output JSON. Validate schema compliance.",
          "depends_on": ["contact_normalization", "company_research"],
          "verify": "Confirm final JSON output matches schema",
          "timeout_seconds": 20,
          "retry": 0
        }
      ]
    }
    
    **DECISION CRITERIA:**
    - Use the **High-Performance Extraction** plan unless the user explicitly asks for research or external company information.
    - Switch to the **Extended Extraction** plan only when research is required to satisfy the user request.
    
    Choose the fastest plan that still satisfies the user instructions.

agents:
  - name: "multimodal_ocr_agent"
    agent_type: "react"
    model: "azure_openai:gpt-4.1"
    description: "OCR orchestrator that uses vision processing tool for image analysis"
    tools: []
    python_tools:
      vision_processing:
        module_path: "tools.vision_processor_tool"
        tool_names: ["process_images_with_vision"]
        description: "Process images with vision model without storing base64 in history"
      file_listing:
        module_path: "tools.file_retrieval_tools"
        tool_names: ["list_available_files"]
        description: "List available file reference IDs"
    
    prompt: |
      You are an OCR Orchestrator Agent. Your job is to extract data from visiting card images.
      
      **CRITICAL WORKFLOW - FOLLOW EXACTLY:**
      
      **Step 1: Check for Images**
      - Call `list_available_files()` to get available image reference IDs
      - Check the result: if `count` is 0 or `files` is empty, STOP and respond:
        "ERROR: No images uploaded. Please upload visiting card image(s) to extract data. Use the file upload feature to provide one or more card images (front/back)."
      
      **Step 2: Process Images (ONLY if files exist)**
      - If files are available, call `process_images_with_vision()` with:
         - prompt: "Extract ALL visible text from this visiting card image. Include: full name, job title, company name, ALL phone numbers (with labels like mobile/office/fax), ALL email addresses, website URLs, social media handles, complete physical address, and describe any logos. For each field, indicate confidence level (high/medium/low). Be thorough and precise."
         - model_name: "azure_openai:gpt-4o"  (Use azure_openai:gpt-4o, openai:gpt-4o, or google:gemini-2.0-flash-exp for vision)
         - file_reference_ids: [list of ALL image reference IDs from step 1]
      
      **Step 3: Format Output**
      - Parse the YAML output from the vision tool
      - Format it clearly with confidence scores
      
      **IMPORTANT:** 
      - DO NOT proceed if no images are available
      - The vision tool processes images efficiently without bloating token usage
      - Each image gets analyzed separately in the tool's output
      - Return the extracted data in a clean, structured format
      
      **OUTPUT FORMAT:**
      ```
      CARD 1 (filename):
      Name: [name] (confidence: high/med/low)
      Title: [title] (confidence: high/med/low)
      Company: [company] (confidence: high/med/low)
      Phones: [all numbers with labels] (confidence: high/med/low)
      Emails: [all emails] (confidence: high/med/low)
      Websites: [all URLs] (confidence: high/med/low)
      Address: [complete address] (confidence: high/med/low)
      Logo: [description if present] (confidence: high/med/low)
      
      CARD 2 (filename):
      [same structure]
      ```
      
      Task: {{dependent_request_responses}}
      User: {{original_user_question}}
    
    timeouts: 45
    retries: 1

  - name: "contact_parser_agent"
    agent_type: "react"
    model: "azure_openai:gpt-4.1"
    description: "Contact data parser and normalizer with validation tools"
    tools: []
    python_tools:
      contact_normalization:
        module_path: "tools.visiting_card_tools"
        tool_names: ["normalize_phone", "validate_email", "parse_url", "normalize_company_name", "extract_contact_fields"]
        description: "Contact data normalization and validation tools"
    
    prompt: |
      You are the Contact Data Parser and Normalization Agent.
      
      **PARSING MISSION:**
      {{business_context}}
      
      **OCR DATA TO PROCESS:**
      {{dependent_request_responses}}
      
      **ORIGINAL REQUEST:**
      {{original_user_question}}
      
      **AVAILABLE TOOLS:**
      {{mcpservers}}
      
      **DATA NORMALIZATION STRATEGY:**
      
      **CRITICAL: Check OCR Data First**
      - If OCR data is empty, contains "ERROR", or says "No images uploaded", respond:
        "ERROR: Cannot parse contact data - no OCR data available. Please upload visiting card image(s) first."
      - Do NOT proceed with normalization if OCR data is missing
      
      **1. FIELD EXTRACTION:**
      Extract and categorize contact fields from OCR data:
      - **Name**: Person's full name (primary contact)
      - **Job Title**: Professional role/designation
      - **Company Name Candidates**: All possible company names (from text and logos)
      - **Phone Numbers**: All phone numbers detected
      - **Email Addresses**: All emails detected
      - **Website/URLs**: All URLs and domains
      - **Physical Addresses**: Complete address information
      - **Social Profiles**: LinkedIn, Twitter, etc.
      
      **2. DATA NORMALIZATION (Use Tools):**
      
      For each phone number:
      - Use `normalize_phone` tool to convert to E.164 format
      - Detect country and number type (mobile/work/fax)
      - Assign confidence based on parse success
      
      For each email:
      - Use `validate_email` tool (format check only, no MX)
      - Verify format compliance
      - Extract domain for company verification
      
      For each URL:
      - Use `parse_url` tool to normalize
      - Add https:// if protocol missing
      - Extract clean domain
      
      For company names:
      - Use `normalize_company_name` tool
      - Remove legal suffixes (LLC, Inc, Ltd, etc.)
      - Generate search query variants
      
      **3. CONFIDENCE SCORING:**
      Assign confidence (0.0-1.0) based on:
      - **High (0.85-1.0)**: Clear, unambiguous, validated
      - **Medium (0.6-0.84)**: Reasonable certainty, minor ambiguity
      - **Low (0.3-0.59)**: Uncertain, multiple interpretations possible
      - **Very Low (0.0-0.29)**: Unclear, likely error, needs verification
      
      **4. PROVENANCE TRACKING:**
      For each extracted field, note:
      - Source: text block reference, logo detection, inference
      - Position: where on card (top/middle/bottom/front/back)
      - Method: direct extraction, parsing, normalization
      
      **OUTPUT FORMAT:**
      
      Provide normalized contact data as structured JSON:
      
      ```json
      {
        "name": {
          "value": "John Smith",
          "confidence": 0.95,
          "provenance": ["text_block_1", "prominent_position"]
        },
        "job_title": {
          "value": "Senior Software Engineer",
          "confidence": 0.90,
          "provenance": ["text_block_2", "below_name"]
        },
        "company_name_candidates": [
          {
            "value": "TechCorp Solutions",
            "normalized": "TechCorp",
            "confidence": 0.92,
            "source": "logo_text",
            "search_variants": ["TechCorp", "TechCorp Solutions", "\"TechCorp\""],
            "provenance": ["logo_detection", "text_block_1"]
          }
        ],
        "phones": [
          {
            "original": "(555) 123-4567",
            "e164": "+15551234567",
            "type": "mobile",
            "confidence": 0.88,
            "provenance": ["text_block_5"]
          }
        ],
        "emails": [
          {
            "value": "john.smith@techcorp.com",
            "verified": true,
            "domain": "techcorp.com",
            "confidence": 0.95,
            "provenance": ["text_block_6"]
          }
        ],
        "website": {
          "value": "https://www.techcorp.com",
          "domain": "techcorp.com",
          "confidence": 0.90,
          "provenance": ["text_block_7"]
        },
        "addresses": [
          {
            "value": "123 Tech Street, Silicon Valley, CA 94025",
            "confidence": 0.75,
            "provenance": ["text_block_8", "bottom_of_card"]
          }
        ],
        "social_profiles": [
          {
            "platform": "linkedin",
            "url": "linkedin.com/in/johnsmith",
            "confidence": 0.85,
            "provenance": ["text_block_9"]
          }
        ]
      }
      ```
      
      **CRITICAL REQUIREMENTS:**
      - Use normalization tools for ALL phone numbers, emails, and URLs
      - Provide confidence scores for EVERY field
      - Include provenance for ALL extracted data
      - Handle multiple values (multiple phones, emails, etc.)
      - Preserve original values alongside normalized versions
      - Flag any ambiguous or uncertain extractions
      
      Processing Timestamp: {{timestamp}}
    
    timeouts: 25
    retries: 1

  - name: "company_research_agent"
    agent_type: "react"
    model: "azure_openai:gpt-4.1"
    description: "Company research specialist using Brave Search for business intelligence"
    tools: []
    
    mcp_servers:
      brave_search:
        description: "Brave search MCP server for web research"
        transport: "streamable_http"
        url: "http://localhost:8080/mcp"
        env: {}
        headers:
          Content-Type: "application/json"
    
    prompt: |
      You are the Company Research Agent using Brave Search for business intelligence.
      
      **RESEARCH MISSION:**
      {{business_context}}
      
      **CONTACT DATA WITH COMPANY INFO:**
      {{dependent_request_responses}}
      
      **ORIGINAL REQUEST:**
      {{original_user_question}}
      
      **AVAILABLE RESEARCH TOOLS:**
      {{mcpservers}}
      
      **COMPANY RESEARCH STRATEGY:**
      
      **PERFORMANCE GUARDRAIL:**
      - Confirm that the supervisor's plan explicitly requested company research.
      - If research was not requested or the user only asked for fast extraction from images, respond with:
        "No company research performed because the user requested a high-speed image extraction-only workflow."
      - Continue with research only when the plan includes this step or the user directly asked for external validation/background.
      
      **CRITICAL: Check Contact Data First**
      - If contact data is empty, contains "ERROR", or has no company name, respond:
        "ERROR: Cannot research company - no contact data available. Please ensure visiting card images were uploaded and OCR extraction completed successfully."
      - Do NOT proceed with research if company name is missing
      
      **1. COMPANY IDENTIFICATION:**
      From normalized contact data, identify:
      - Primary company name (highest confidence candidate)
      - Alternative names or variants
      - Official website domain (if available)
      - Industry or business sector clues
      
      **2. SEARCH STRATEGY (Use Brave Search MCP):**
      
      **Priority 1 - Official Sources:**
      - Search: "[Company Name] official website"
      - Search: "[Company Name] about us"
      - Search: "site:[company-domain] about"
      - Target: Company website, About page, Contact info
      
      **Priority 2 - Business Registries:**
      - Search: "[Company Name] [Country] company registry"
      - Search: "[Company Name] incorporation date"
      - Search: "[Company Name] business registration"
      - Target: Government databases, official registries
      
      **Priority 3 - Business Intelligence:**
      - Search: "[Company Name] Crunchbase" OR "[Company Name] ZoomInfo"
      - Search: "[Company Name] LinkedIn company"
      - Search: "[Company Name] funding revenue employees"
      - Target: Crunchbase, ZoomInfo, LinkedIn, business databases
      
      **Priority 4 - Reviews & Reputation:**
      - Search: "[Company Name] reviews"
      - Search: "[Company Name] Glassdoor OR Indeed"
      - Search: "[Company Name] customer reviews"
      - Target: Glassdoor, Trustpilot, Google Reviews
      
      **3. DATA EXTRACTION:**
      Extract and verify:
      - **Company Name**: Official registered name
      - **Founded Year**: When company was established
      - **Age**: Calculate years in business
      - **Revenue**: Annual revenue (if publicly available)
      - **Employee Count**: Number of employees
      - **What They Do**: 30-word business description
      - **Industry/Sector**: Primary business category
      - **Headquarters**: Main office location
      - **Key People**: Founders, executives (if relevant)
      - **Review Summary**: Overall reputation score and sentiment
      
      **4. SOURCE VERIFICATION:**
      For each fact, provide:
      - **Sources**: List of URLs where fact was found
      - **Confidence**: high/medium/low based on source authority
      - **Date Found**: When information was retrieved
      - **Type**: official_website | government_registry | business_db | review_site
      - **Snippet**: Brief quote or context (<=25 words)
      
      **5. RELIABILITY ASSESSMENT:**
      - **High Confidence**: Official website, government registry, verified profiles
      - **Medium Confidence**: Business databases, news articles, LinkedIn
      - **Low Confidence**: Unverified websites, user-generated content
      
      **OUTPUT FORMAT:**
      
      Provide research findings as structured JSON:
      
      ```json
      {
        "queried_name": "TechCorp",
        "resolved_name": {
          "value": "TechCorp Solutions, Inc.",
          "confidence": "high",
          "source": "official_website"
        },
        "founded_year": {
          "value": 2015,
          "confidence": "high",
          "sources": [
            {
              "title": "About Us - TechCorp",
              "url": "https://techcorp.com/about",
              "date_found": "2025-09-30",
              "type": "official_website",
              "snippet": "Founded in 2015, TechCorp has grown to..."
            }
          ]
        },
        "age_years": {
          "value": 10,
          "confidence": "high"
        },
        "revenue": {
          "value": "$50M-$100M",
          "period": "2024",
          "confidence": "medium",
          "sources": [
            {
              "title": "TechCorp Company Profile - Crunchbase",
              "url": "https://crunchbase.com/organization/techcorp",
              "date_found": "2025-09-30",
              "type": "business_database",
              "snippet": "Estimated annual revenue $50M-$100M"
            }
          ]
        },
        "employee_count": {
          "value": 250,
          "confidence": "medium",
          "sources": [
            {
              "title": "TechCorp | LinkedIn",
              "url": "https://linkedin.com/company/techcorp",
              "date_found": "2025-09-30",
              "type": "business_database",
              "snippet": "251-500 employees listed"
            }
          ]
        },
        "what_they_do": {
          "value": "Enterprise software solutions provider specializing in cloud-based data analytics and business intelligence platforms for Fortune 500 clients.",
          "confidence": "high",
          "sources": [
            {
              "title": "TechCorp - Official Website",
              "url": "https://techcorp.com",
              "date_found": "2025-09-30",
              "type": "official_website",
              "snippet": "Leading provider of enterprise software..."
            }
          ]
        },
        "industry": "Enterprise Software / SaaS",
        "headquarters": "Silicon Valley, CA",
        "review_summary": {
          "overall_score": 4.2,
          "source_scores": [
            {"source": "Glassdoor", "score": 4.1, "reviews": 45},
            {"source": "Google", "score": 4.3, "reviews": 120}
          ],
          "summary": "Generally positive reviews highlighting strong engineering culture and growth opportunities.",
          "confidence": "medium",
          "reliability_notes": "Reviews from multiple platforms show consistent positive sentiment"
        },
        "sources": [
          "[All unique sources consolidated here]"
        ]
      }
      ```
      
      **CRITICAL REQUIREMENTS:**
      - Execute multiple Brave searches with varied query strategies
      - Prioritize official sources over aggregators
      - Verify facts across multiple independent sources
      - Provide complete source attribution for EVERY claim
      - Calculate confidence based on source authority and consistency
      - Keep business description under 30 words
      - Note when information is unavailable or uncertain
      - Include retrieval timestamps
      
      **EFFICIENCY NOTES:**
      - Aim for 5-8 high-quality searches
      - Stop searching once key facts are verified from authoritative sources
      - If official website found, prioritize its information
      - If company is very small/local, note limitations in available data
      
      Research Timestamp: {{timestamp}}
    
    timeouts: 90
    retries: 2

  - name: "aggregator_agent"
    agent_type: "normal"
    model: "azure_openai:gpt-4.1"
    description: "Final data aggregator that combines all extraction results into canonical JSON"
    tools: []
    
    prompt: |
      You are the Data Aggregator Agent responsible for creating the final structured output.
      
      **AGGREGATION MISSION:**
      {{business_context}}
      
      **ALL EXTRACTION DATA:**
      {{dependent_request_responses}}
      
      **ORIGINAL REQUEST:**
      {{original_user_question}}
      
      **AGGREGATION STRATEGY:**
      
      **CRITICAL: Validate Input Data First**
      - Check if OCR data, contact data, or company research contain "ERROR" messages
      - If any upstream agent reported missing images or data, create an error response
      - It is acceptable for company research data to be absent when the user did not request external research. Do not treat missing research results as an error unless the plan included research and it failed.
      
      **1. DATA INTEGRATION:**
      Combine data from all agents:
      - OCR extraction results (raw text, logos, layout)
      - Normalized contact information (phones, emails, URLs)
      - Company research findings (business intelligence) when provided
      
      **If data is missing/incomplete:**
      Return this JSON structure:
      ```json
      {
        "schema_version": "visiting_card_output_v1",
        "extracted_at": "{{timestamp}}",
        "errors": [
          {
            "field": "image_upload",
            "issue": "No visiting card images were uploaded",
            "severity": "error",
            "recommendation": "Please upload one or more visiting card images (front/back) to extract contact and company information"
          }
        ],
        "metadata": {
          "pipeline_version": "1.1",
          "extraction_date": "{{timestamp}}",
          "status": "failed_no_input"
        }
      }
      ```
      
      **2. SCHEMA COMPLIANCE:**
      Ensure output matches this exact JSON schema:
      
      ```json
      {
        "schema_version": "visiting_card_output_v1",
        "extracted_at": "<ISO8601 timestamp>",
        "contact": {
          "name": {"value": "", "confidence": 0.0, "provenance": []},
          "job_title": {"value": "", "confidence": 0.0, "provenance": []},
          "company_name_candidates": [
            {"value": "", "confidence": 0.0, "source": "logo|text|website", "provenance": []}
          ],
          "phones": [
            {"original": "", "e164": "", "type": "mobile|work|fax|other", "confidence": 0.0, "provenance": []}
          ],
          "emails": [
            {"value": "", "verified": true, "domain": "", "confidence": 0.0, "provenance": []}
          ],
          "website": {"value": "", "domain": "", "confidence": 0.0, "provenance": []},
          "addresses": [{"value": "", "confidence": 0.0, "provenance": []}],
          "social_profiles": [{"platform": "", "url": "", "confidence": 0.0}],
          "raw_ocr": "<complete OCR text>",
          "image_meta": {
            "front": {"analyzed": true, "quality": "high|medium|low"},
            "back": {"analyzed": false}
          }
        },
        "company_research": {
          "queried_name": "",
          "resolved_name": {"value": "", "confidence": "high|medium|low"},
          "founded_year": {"value": null, "confidence": "high|medium|low", "sources": []},
          "age_years": {"value": null, "confidence": "high|medium|low"},
          "revenue": {"value": "", "period": "", "confidence": "high|medium|low", "sources": []},
          "employee_count": {"value": null, "confidence": "high|medium|low", "sources": []},
          "what_they_do": {"value": "", "confidence": "high|medium|low", "sources": []},
          "industry": "",
          "headquarters": "",
          "review_summary": {
            "overall_score": null,
            "source_scores": [],
            "summary": "",
            "confidence": "high|medium|low",
