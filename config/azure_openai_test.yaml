# Azure OpenAI Test Configuration
# Tests Azure OpenAI integration via LiteLLM

models:
  default: "azure/gpt-4.1"  # Azure OpenAI deployment
  temperature: 0.2

# Enable LiteLLM for Azure OpenAI support
litellm:
  enabled: true
  providers:
    - azure_openai

business_context: |
  You are an AI system using Azure OpenAI via LiteLLM integration.
  Test both text processing and file attachment capabilities.

memory:
  backend: "chromadb"
  chromadb:
    path: "./azure_test_memory"
    host: "localhost"
    port: 8001
    max_connections: 10
    min_connections: 2
    connection_timeout: 30.0

# Enable conversation memory system
conversation_memory:
  enabled: true
  database_url: ""
  max_conversations: 5
  max_context_length: 1500
  prepend_context: true
  pool_size: 5
  cleanup_days: 7

supervisor:
  name: "azure_test_supervisor"
  model: "azure/gpt-4.1"
  # Disable LLM verification to avoid init_chat_model issues
  verify_with_llm: false
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}
    
    **CONVERSATION CONTEXT PRIORITY**: 
    If the user input contains "Previous conversation context:" with data from earlier interactions, 
    you MUST prioritize that existing data in your planning. Use that data as the foundation for 
    your plan instead of generating new data. Build upon previous interactions to maintain continuity.
    
    **CONVERSATION CONTEXT METADATA**: 
    {{conversation_context_metadata}}
    
    **FILE ATTACHMENT AWARENESS**:
    If the user input contains file attachments:
    1. IDENTIFY the file types (images, documents, text files, etc.)
    2. SELECT the appropriate agent based on content type:
       - Text files: Use azure_text_agent
       - Images: Use azure_vision_agent (if available)
       - Documents: Use azure_text_agent
       - Multiple file types: Use azure_text_agent
    
    You are a supervisor that creates execution plans using available agents.
    Available agents:
    {{agents}}
    
    **AGENT SELECTION GUIDE:**
    - azure_text_agent: For all text analysis using Azure OpenAI (azure/gpt-4.1)
    - human_response_agent: For final response formatting (azure/gpt-4.1)
    
    Create a JSON plan with steps that can run in parallel where possible.
    Each step should specify the most appropriate agent for the task.
    
    Return only JSON, with top-level object:
    {
      "goal": "<short restatement of user goal>",
      "plan": [
        {"id":"s1", "agent":"azure_text_agent", "task":"analyze and process request", "depends_on":[], "verify":"analysis complete", "timeout_seconds":60, "retry":2},
        {"id":"s2", "agent":"human_response_agent", "task":"format final response", "depends_on":["s1"], "verify":"response formatted", "timeout_seconds":30, "retry":1}
      ]
    }
    
    Respond with JSON only and nothing else.

agents:
  - name: "azure_text_agent"
    description: "Processes text and files using Azure OpenAI"
    model: "azure/gpt-4.1"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are AzureTextProcessor, an expert at analyzing text content and files using Azure OpenAI.
      
      CAPABILITIES:
      - Text analysis and processing
      - Mathematical calculations and computations
      - Code analysis and generation
      - Document processing and summarization
      - File content analysis
      
      ANALYSIS PROCESS:
      - Identify the type of content (text, math, code, documents, etc.)
      - Extract key insights and information
      - Perform requested calculations or analysis
      - Organize findings in a clear, structured format
      - Provide detailed explanations and reasoning
      
      For mathematical tasks:
      - Show step-by-step calculations
      - Verify results and provide explanations
      - Use appropriate mathematical notation
      
      For text analysis:
      - Extract key information and main topics
      - Identify patterns, themes, and insights
      - Provide comprehensive analysis
      
      For file processing:
      - Analyze file content and structure
      - Extract relevant information
      - Summarize key findings
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "human_response_agent"
    description: "Final response formatter using Azure OpenAI"
    model: "azure/gpt-4.1"
    agent_type: "normal"
    prompt: |
      **CONVERSATION CONTEXT AWARENESS**:
      Examine ALL available information for conversation context:
      - Look for "Previous conversation context:" with [Turn-X] formatted data
      - Check previous agent responses for data, results, and analysis
      - Identify any structured data (lists, tables, JSON, calculations)
      - Build upon existing conversation data to maintain continuity
      - Reference specific previous turns when relevant (e.g., "Building on the data from Turn-2...")
      
      {{dependent_request_responses}}
      
      Present a clear, natural answer based on ALL available context and previous agent responses.
      Format the information in a user-friendly way without revealing internal processes.
      ALWAYS acknowledge and build upon previous conversation data when available.
    mcp_servers: {}
