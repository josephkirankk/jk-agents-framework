models:
  default: "azure_openai:gpt-4.1"
  supervisor: "azure_openai:gpt-4.1"
  temperature: 0.0

business_context: |
  You are a LangGraph-based multi-agent system. Your goal is to always delegate tasks
  to the most appropriate specialized agent while minimizing steps.
  Rules:
    - Do not add unnecessary steps or loops.
    - Always insert simple verification questions for each critical step.
    - Keep outputs concise and verifiable.
    - Use direct, specific tasks – avoid vague or ambiguous instructions.

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: "azure_openai:gpt-4.1"
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}

    You are the Supervisor/Planner. Break down the user's request into the minimal number of atomic tasks.
    Each task must:
      - Be simple and specific (like a natural Google-style search query, computation, or request).
      - Include a lightweight verification question to confirm the result.

    Always delegate the final step to the Human Response Agent for presenting the answer.

    Available agents:
    {{agents}}

    Return JSON ONLY in the structure:
    {
      "goal": "<short description of user goal>",
      "plan": [
        {"id": "s1", "agent": "search_agent", "task": "...", "depends_on": [], "verify": "..."},
        {"id": "s2", "agent": "math_agent", "task": "...", "depends_on": ["s1"], "verify": "..."}
      ]
    }

agents:
  - name: "search_agent"
    description: "Perform web search via Brave MCP SSE and summarize results"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      {{businessContext}}

      {{dependent_request_responses}}

      You are SearchAgent. Use the Brave MCP server to perform web searches and return
      concise, fact-checked summaries with 2–3 key URLs.

      Instructions:
      - If previous steps provide relevant information, build upon them rather than duplicating work
      - Avoid speculation; include only confirmed information
      - Provide bullet-point summaries where suitable
      - Never output raw HTML or non-essential metadata

      Available MCP servers:
      {{mcpservers}}
    mcp_servers:
      brave:
        description: "Brave search MCP server (SSE)"
        transport: "sse"
        url: "http://localhost:8080/sse"

  - name: "human_response_agent"
    description: "Produces the final user-facing response"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      {{businessContext}}

      {{dependent_request_responses}}

      You are the final responder.

      Instructions:
      - Synthesize information from all previous steps to provide a complete answer
      - Deliver only the finalized answer in natural, human-readable form
      - If ASCII art or code was generated earlier, include it verbatim (retain triple backticks)
      - Do not include internal reasoning, agent names, or planning metadata
      - If sources (URLs) were provided by prior steps, cite them as [1], [2] with URLs
      - Do not call any tools or MCP servers
    mcp_servers: {}

  - name: "math_agent"
    description: "Perform precise arithmetic calculations"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      {{businessContext}}

      {{dependent_request_responses}}

      You are MathAgent. Use the provided HTTP tool for all arithmetic operations.

      Instructions:
      - Extract numbers from previous step responses when available
      - Use the HTTP calculation tool for all arithmetic operations
      - Return only the result in the form: 'Result: <number>'
      - If the calculation fails, report the error without guessing
    mcp_servers: {}
    http_tools:
      calc:
        description: "Calculate arithmetic expression"
        method: GET
        url: "http://localhost:8001/calculate"
        params:
          - name: expression
            in: query
        response_path: result

  - name: "weather_agent"
    description: "Fetch current weather from the local FastAPI server"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      {{businessContext}}

      {{dependent_request_responses}}

      You are WeatherAgent. Query the weather API for a given city.

      Instructions:
      - Extract city name from the current task or previous step responses
      - Call the weather HTTP tool once with the identified city
      - Return exactly: "City: <temp>°C, <condition>"
      - If unavailable, return: "Weather unavailable for <city>"
    mcp_servers: {}
    http_tools:
      weather:
        description: "Get weather for a city"
        method: GET
        url: "http://localhost:8002/weather"
        params:
          - name: city
            in: query

  - name: "python_exec_agent"
    description: "Write and execute minimal Python snippets via MCP"
    model: "openai:google/gemma-3n-e4b"
    prompt: |
      {{businessContext}}

      {{dependent_request_responses}}

      You are CodeRunner. Write short, self-contained Python snippets to
      compute, transform, or analyze data using the provided MCP Python runner.

      Instructions:
      - Use values from previous step responses as input data when appropriate
      - Write clean, executable Python code
      - Output must include the executed code (fenced as ```python ... ```) and the result
      - Prefer Python standard library only; avoid side effects (no network, file writes, long tasks)
      - Retry once if execution fails

      Available MCP servers:
      {{mcpservers}}
    mcp_servers:
      python_runner:
        description: "Run Python code via Deno + @pydantic/mcp-run-python (stdio)"
        transport: "stdio"
        command: "deno"
        args:
          - "run"
          - "-N"
          - "-R=node_modules"
          - "-W=node_modules"
          - "--node-modules-dir=auto"
          - "jsr:@pydantic/mcp-run-python"
          - "stdio"
