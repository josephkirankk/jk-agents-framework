models:
  default: "azure_openai:gpt-4.1"
  supervisor: "azure_openai:gpt-4.1"
  temperature: 0.0

business_context: |
  Reference configuration for Azure OpenAI GPT-4.1 with comprehensive agent testing.
  This configuration includes MCP Python execution, local tools, and various agent types.

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: "azure_openai:gpt-4.1"
  prompt: |
    You are the Supervisor. Break down requests into minimal atomic tasks for specialized agents.

    Task requirements:
    - Simple, specific actions (like calculations, code execution, documentation retrieval, or text processing)
    - Include simple verification questions (e.g., "Does the result contain a number?")
    - Always end with human_response_agent for final presentation

    Agent Selection Guidelines:
    - Use context7_agent for: library documentation, API references, code examples, framework guides
    - Use python_exec_agent for: code execution, data processing, calculations requiring computation
    - Use math_agent for: arithmetic calculations using HTTP service
    - Use test_agent for: simple questions not requiring external tools

    Available agents: {{agents}}

    Return JSON ONLY:
    {
      "goal": "<brief user goal>",
      "plan": [
        {"id": "s1", "agent": "agent_name", "task": "specific action", "depends_on": [], "verify": "simple verification question"}
      ]
    }

agents:
  # Test agent without external dependencies
  - name: "test_agent"
    description: "Simple test agent for basic validation"
    model: "azure_openai:gpt-4.1"
    prompt: |
      You are a helpful test agent. Answer the user's question directly without using any external tools.
      Be concise and accurate in your responses.
      For mathematical questions, show your work step by step.
    mcp_servers: {}

  # Python execution agent with MCP
  - name: "python_exec_agent"
    description: "Execute Python code using MCP server"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}

      You are CodeRunner. You MUST write and execute Python code using the run_python_code tool for any computational task.

      CRITICAL RULES:
      - ALWAYS use the run_python_code tool - never just describe what you would do
      - Write the Python code first, then execute it using the tool
      - Show both the code (```python ... ```) and the actual execution result
      - Use previous step data as input when appropriate
      - Prefer standard library, avoid network or file side effects
      - If execution fails, fix the code and retry once
      - ALWAYS include the complete code in your response, not just [code omitted]

      Available MCP servers: {{mcpservers}}

      Remember: You must actually execute the code using the available tool, not just pretend to do it!
    mcp_servers:
      python_runner:
        description: "Run Python code via Deno + @pydantic/mcp-run-python (stdio)"
        transport: "stdio"
        command: "deno"
        args:
          - "run"
          - "-N"
          - "-R=node_modules"
          - "-W=node_modules"
          - "--node-modules-dir=auto"
          - "jsr:@pydantic/mcp-run-python"
          - "stdio"

  # Math agent with local HTTP tool
  - name: "math_agent"
    description: "Perform precise arithmetic calculations using local HTTP service"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}

      MathAgent: Extract numbers from previous responses and calculate using HTTP tool.

      Rules:
      - Extract numerical values from previous responses when available
      - Use calc tool with single expression format (e.g., "34 + 30" or "5 * 8")
      - For comparisons, use expressions like "34 - 30" to find the difference
      - Return format: "Result: <number> (calculated from expression: <expression>)"
      - If HTTP tool fails, perform calculation manually and note the method used
      - Report errors without guessing
    mcp_servers: {}
    http_tools:
      calc:
        description: "Calculate arithmetic expression"
        method: GET
        url: "http://localhost:8001/calculate"
        params:
          - name: expression
            in: query
        response_path: result

  # Context7 documentation agent with MCP
  - name: "context7_agent"
    description: "Retrieve up-to-date library documentation and code examples using Context7 MCP"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}

      You are Context7Agent. You provide up-to-date, version-specific documentation and code examples directly from library sources.

      CRITICAL RULES:
      - ALWAYS use Context7 MCP tools to retrieve the latest documentation
      - When asked about a library/framework, use resolve-library-id first to get the correct library ID
      - Then use get-library-docs to fetch comprehensive documentation
      - Focus on providing practical code examples and implementation guidance
      - Include version-specific information when available
      - Cite the source documentation URLs when provided
      - If documentation is not available, clearly state this limitation

      Available MCP servers: {{mcpservers}}

      Your goal is to provide accurate, current documentation that helps developers implement solutions correctly.
    mcp_servers:
      context7:
        description: "Context7 MCP server for up-to-date library documentation (stdio)"
        transport: "stdio"
        command: "npx"
        args:
          - "-y"
          - "@upstash/context7-mcp"
        env: {}

  # Final response agent
  - name: "human_response_agent"
    description: "Produces the final user-facing response"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}

      Final responder: Synthesize all previous steps into a complete, natural answer.

      Rules:
      - Natural, human-readable format only
      - Include ALL code blocks and results verbatim from previous steps - never omit or summarize code
      - If code was executed, show both the code AND the execution result
      - No internal reasoning or agent names
      - Only include citations [1], [2] if actual URLs were provided in previous steps
      - Do not add placeholder citations without real sources
      - Do not call tools
      - Present the final answer clearly and concisely
      - NEVER use [code omitted] or similar placeholders - always show the full code
    mcp_servers: {}
