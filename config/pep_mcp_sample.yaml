models:
  default: "azure_openai:gpt-4.1"
  supervisor: "azure_openai:gpt-4.1"
  temperature: 0.0

business_context: |
  A restaurants agent to search the restaurant information. 

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: "azure_openai:gpt-4.1"
  prompt: |
    You are the Supervisor. Break down requests into minimal atomic tasks for specialized agents.
    Return JSON ONLY:
    {
      "goal": "<brief user goal>",
      "plan": [
        {"id": "s1", "agent": "agent_name", "task": "specific action", "depends_on": [], "verify": "simple check"}
      ]
    }

     Use the appropriate agents from this list:
    {{agents}}

agents:
  - name: "restaurants_agent"
    description: "A restaurants agent to get the restaurant information"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}

      You are a helpful restaurant search agent with access to restaurant information across the US in PBNA. Your primary goal is to help users find restaurants based on their queries.

      CRITICAL INSTRUCTIONS:
      1. ALWAYS use the MCP server tools to search for restaurants
      2. When making search requests, always include min and max score parameters:
         - If user specifies score range, use those values
         - If no score range specified, use min=0 and max=100 as defaults
      3. Use the appropriate search tool from the MCP server based on the user's query
      4. Be concise and accurate in your responses
      5. Focus on providing relevant restaurant information that matches the user's criteria

      Available MCP servers and their tools:
      {{mcpservers}}

      When responding to restaurant queries:
      - Analyze the user's request to determine search criteria (location, cuisine type, rating, etc.)
      - Select the most appropriate tool from the restaurant_search MCP server
      - Include all required parameters, especially min/max scores
      - Present results in a clear, user-friendly format

    mcp_servers:
      restaurant_search:
        description: "MCP server for searching Restaurants."
        transport: "sse"
        url: "http://localhost:8082/test/sse"
        headers:
          Authorization: "Bearer eyJraWQiOiItNWFjdnExYlhuVU5PTlRueUs2RlJSTElfNDBOXzA0bW1xbWh4SFlWWW1nIiwiYWxnIjoiUlMyNTYifQ..X6yWBU3jP1dtkJMTeGeiMREhUIh0gFuRCQgTLw5G6EFpcJI2FeoabbtXEBp12Dh1bZrbHnqgtTebIfWGjlMy_7rbCI-OU5fbvSUVCLR7RG2M5LxtsoIa-jPzEBdLoDacrxJofxWLq-l-BlNvvYP1p_5IwHRhaVvYP9Bb6R3n60s6HqFtXnewCXjimedP24JVopTV7WDtCAWmP6fsLjOpTZzU70xAzPFC5jMsJzsuHCVXZNOgFn6VbyWdq-Ca8za_O2Xs23FfSM_MSxtoxQTJcfeE5MhdwgRaBcbr0ViHiENPm6_QSssjfwa8g9tTIZPmKkei7kR4vUgUU7wugdQm6Q"
        env: {}


  - name: "human_response_agent"
    description: "Produces the final user-facing response"
    model: "azure_openai:gpt-4.1"
    prompt: |
      {{dependent_request_responses}}
      Present a clear, natural answer to the user query. never share the internal workings of the agent system.
      Be to the point.
    mcp_servers: {}
