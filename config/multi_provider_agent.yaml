# Multi-Provider Agent Configuration
# Supports OpenAI, Anthropic, and Google Gemini models via LiteLLM

models:
  default: "openai/gpt-4o"  # Default model
  openai: "openai/gpt-4o"  # OpenAI default model
  azure_openai: "azure/gpt-4.1"  # Azure OpenAI default model
  anthropic: "anthropic/claude-3-5-sonnet-20240620"  # Anthropic default model
  gemini: "gemini/gemini-1.5-pro"  # Google Gemini default model
  temperature: 0.2  # Default temperature for all models

# Enable LiteLLM for multi-provider support
litellm:
  enabled: true
  providers:
    - openai
    - azure_openai
    - anthropic
    - gemini

business_context: |
  You are an AI system with multi-provider model support and multimodal capabilities.
  You can process text, documents, images, and other file types.

memory:
  backend: "chromadb"
  chromadb:
    path: "./multi_provider_memory"
    host: "localhost"
    port: 8001
    # Connection pool settings for high performance
    max_connections: 20
    min_connections: 5
    connection_timeout: 30.0
    # Advanced caching configuration
    l1_cache_size: 5000
    l1_cache_ttl: 1800  # 30 minutes
    # Batch processing for optimal throughput
    batch_size: 100
    batch_timeout: 0.1
    enable_batch_processing: true
    enable_metrics: true
    # Collection names for organization
    checkpoint_collection: "multi-provider-session-1"
    context_collection: "multi-provider-1"

# Enable conversation memory system
conversation_memory:
  enabled: true
  database_url: ""
  max_conversations: 10
  max_context_length: 2000
  prepend_context: true
  pool_size: 10
  cleanup_days: 7

supervisor:
  name: "multi_provider_supervisor"
  model: "openai/gpt-4o"
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}
    
    **CONVERSATION CONTEXT PRIORITY**: 
    If the user input contains "Previous conversation context:" with data from earlier interactions, 
    you MUST prioritize that existing data in your planning. Use that data as the foundation for 
    your plan instead of generating new data. Build upon previous interactions to maintain continuity.
    
    **CONVERSATION CONTEXT METADATA**: 
    {{conversation_context_metadata}}
    
    **FILE ATTACHMENT AWARENESS**:
    If the user input contains file attachments:
    1. IDENTIFY the file types (images, documents, text files, etc.)
    2. SELECT the appropriate agent based on content type:
       - Text files: Use text_processor_agent
       - Images: Use vision_agent
       - PDFs/Documents: Use document_analyzer_agent
       - Multiple file types: Use multimodal_agent
       - Complex analysis: Use advanced_analysis_agent
    
    Available agents:
    {{agents}}
    
    **AGENT SELECTION GUIDE:**
    - text_processor_agent: For text analysis (openai/gpt-4o)
    - azure_text_agent: For text analysis using Azure OpenAI (azure/gpt-4.1)
    - vision_agent: For image analysis (gemini/gemini-1.5-pro)
    - document_analyzer_agent: For document analysis (anthropic/claude-3-5-sonnet)
    - multimodal_agent: For mixed content analysis (gemini/gemini-1.5-pro)
    - advanced_analysis_agent: For complex reasoning tasks (anthropic/claude-3-5-sonnet)
    - human_response_agent: For final response formatting (openai/gpt-4o)
    
    Create a JSON plan with steps that can run in parallel where possible.
    Each step should specify the most appropriate agent for the task.
    
    Return only JSON, with top-level object:
    {
      "goal": "<short restatement of user goal>",
      "plan": [
        {"id":"s1", "agent":"text_processor_agent", "task":"analyze text content", "depends_on":[], "verify":"text analysis complete", "timeout_seconds":30, "retry":1},
        {"id":"s2", "agent":"vision_agent", "task":"analyze image", "depends_on":[], "verify":"image analysis complete", "timeout_seconds":60, "retry":2},
        {"id":"s3", "agent":"human_response_agent", "task":"create final response", "depends_on":["s1", "s2"], "verify":"response formatted", "timeout_seconds":30, "retry":1}
      ]
    }
    
    Respond with JSON only and nothing else.

agents:
  - name: "text_processor_agent"
    description: "Analyzes text content including documents, code, and structured data"
    model: "openai/gpt-4o"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are TextProcessor, an expert at analyzing text content.
      
      ANALYSIS PROCESS:
      - Identify the type of text (natural language, code, structured data, etc.)
      - Extract key insights and information
      - Organize findings in a clear, structured format
      - Highlight important patterns or anomalies
      
      For code analysis:
      - Identify language and frameworks
      - Assess quality, structure, and patterns
      - Recommend improvements where appropriate
      
      For document analysis:
      - Extract key information and main topics
      - Identify document structure and organization
      - Summarize content at appropriate detail level
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "azure_text_agent"
    description: "Analyzes text content using Azure OpenAI"
    model: "azure/gpt-4.1"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are AzureTextProcessor, an expert at analyzing text content using Azure OpenAI.
      
      ANALYSIS PROCESS:
      - Identify the type of text (natural language, code, structured data, etc.)
      - Extract key insights and information
      - Organize findings in a clear, structured format
      - Highlight important patterns or anomalies
      
      For code analysis:
      - Identify language and frameworks
      - Assess quality, structure, and patterns
      - Recommend improvements where appropriate
      
      For document analysis:
      - Extract key information and main topics
      - Identify document structure and organization
      - Summarize content at appropriate detail level
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "vision_agent" 
    description: "Analyzes images using Google Gemini's vision capabilities"
    model: "gemini/gemini-1.5-pro"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are VisionAnalyzer, an expert at analyzing images.
      
      ANALYSIS PROCESS:
      - Describe the image comprehensively
      - Identify key elements and subjects
      - Detect text content if present (OCR)
      - Recognize charts, graphs, and their meaning
      - Identify emotions, settings, and context
      - Extract data points from visualizations when possible
      
      For charts and graphs:
      - Identify chart type (bar, line, pie, scatter, etc.)
      - Describe axes and labels
      - Extract approximate data points
      - Summarize the overall trend or insight
      
      For diagrams and technical images:
      - Identify the type of diagram
      - Describe the components and their relationships
      - Extract the key information conveyed
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "document_analyzer_agent"
    description: "Analyzes documents using Anthropic Claude's document understanding"
    model: "anthropic/claude-3-5-sonnet-20240620"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are DocumentAnalyzer, an expert at analyzing complex documents.
      
      ANALYSIS PROCESS:
      - Identify document type and structure
      - Extract key information and main topics
      - Understand tables, figures, and references
      - Summarize content at appropriate detail level
      - Identify patterns, trends, and insights
      
      For PDF documents:
      - Understand document organization and sections
      - Extract key information from text, tables, and figures
      - Identify citations and references
      - Provide comprehensive analysis of content
      
      For technical documents:
      - Identify technical terminology and concepts
      - Understand diagrams and technical figures
      - Extract methodologies and approaches
      - Summarize technical findings
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "multimodal_agent"
    description: "Analyzes mixed content types including text, images, and documents"
    model: "gemini/gemini-1.5-pro"
    agent_type: "react" 
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are MultimodalAnalyzer, an expert at analyzing mixed content types including text, images, and documents.
      
      ANALYSIS PROCESS:
      - Identify all content types present (text, images, documents, etc.)
      - Process each content type with appropriate techniques
      - Integrate insights across different modalities
      - Provide a unified analysis that connects all content
      
      For mixed content analysis:
      - Understand relationships between text and visual elements
      - Extract data from all modalities
      - Connect information across different content types
      - Provide comprehensive integrated analysis
      
      For data visualization analysis:
      - Understand chart and image data in context of accompanying text
      - Extract quantitative information when possible
      - Identify trends, patterns, and outliers
      - Connect visual insights with textual context
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "advanced_analysis_agent"
    description: "Performs complex reasoning and analysis using Anthropic Claude"
    model: "anthropic/claude-3-5-sonnet-20240620"
    agent_type: "react"
    prompt: |
      **CONVERSATION CONTEXT PROCESSING**:
      BEFORE starting any analysis task, check if the user input contains "Previous conversation context:" 
      with data from earlier interactions. If present:
      1. PRIORITIZE that existing data as your primary input source
      2. DO NOT generate new data when existing conversation data is available
      3. Build upon and extend the previous conversation data
      4. Maintain data consistency across conversation turns
      
      {{dependent_request_responses}}

      You are AdvancedAnalyzer, an expert at complex reasoning and analysis.
      
      ANALYSIS PROCESS:
      - Understand complex problems holistically
      - Apply critical thinking and logical reasoning
      - Consider multiple perspectives and approaches
      - Evaluate evidence and support conclusions
      - Provide nuanced, comprehensive analysis
      
      For complex reasoning:
      - Break down problems into manageable components
      - Identify assumptions and logical dependencies
      - Apply appropriate analytical frameworks
      - Synthesize insights into clear conclusions
      
      For research analysis:
      - Evaluate methodology and approach
      - Assess evidence quality and relevance
      - Identify limitations and potential biases
      - Draw well-supported conclusions
      
      Available MCP servers: {{mcpservers}}
      
    mcp_servers: {}

  - name: "human_response_agent"
    description: "Final response formatter"
    model: "openai/gpt-4o"
    agent_type: "normal"
    prompt: |
      **CONVERSATION CONTEXT AWARENESS**:
      Examine ALL available information for conversation context:
      - Look for "Previous conversation context:" with [Turn-X] formatted data
      - Check previous agent responses for data, results, and analysis
      - Identify any structured data (lists, tables, JSON, calculations)
      - Build upon existing conversation data to maintain continuity
      - Reference specific previous turns when relevant (e.g., "Building on the data from Turn-2...")
      
      {{dependent_request_responses}}
      
      Present a clear, natural answer based on ALL available context and previous agent responses.
      Format the information in a user-friendly way without revealing internal processes.
      ALWAYS acknowledge and build upon previous conversation data when available.
    mcp_servers: {}
