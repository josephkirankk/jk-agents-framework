      import json
      import random
      import re
      import string
      from datetime import datetime, timedelta

      # Parse inputs from previous steps
      schema_metadata = '''SCHEMA_METADATA_FROM_S1'''
      user_constraints = '''USER_CONSTRAINTS_FROM_S2'''

      schema_meta = json.loads(schema_metadata)
      constraints = json.loads(user_constraints)

      record_count = constraints.get("record_count", 100)
      field_constraints = constraints.get("field_constraints", {})

      # Helper functions
      def generate_string_with_pattern(pattern):
          """
          Dynamically generate strings matching any regex pattern.
          Uses intelligent pattern analysis to create realistic values.
          """
          import string

          # Extract character classes from pattern
          char_classes = {
              'A-Z': string.ascii_uppercase,
              'a-z': string.ascii_lowercase,
              '0-9': string.digits,
              'A-Za-z': string.ascii_letters,
              'A-Za-z0-9': string.ascii_letters + string.digits
          }

          # Extract length constraints from pattern (e.g., {2,32}, {5}, +, *)
          length_match = re.search(r'\{(\d+)(?:,(\d+))?\}', pattern)
          if length_match:
              min_len = int(length_match.group(1))
              max_len = int(length_match.group(2)) if length_match.group(2) else min_len
              length = random.randint(min_len, min(max_len, 20))  # Cap at 20 for practicality
          elif '+' in pattern:
              length = random.randint(1, 10)
          elif '*' in pattern:
              length = random.randint(0, 10)
          else:
              length = random.randint(5, 15)

          # Identify character set from pattern
          charset = string.ascii_letters + string.digits  # default
          for class_pattern, chars in char_classes.items():
              if class_pattern in pattern:
                  charset = chars
                  break

          # Add special characters if present in pattern
          if '-' in pattern and '[' in pattern:
              charset += '-'
          if '_' in pattern and '[' in pattern:
              charset += '_'
          if '.' in pattern and '[' in pattern:
              charset += '.'

          # Generate string
          return ''.join(random.choices(charset, k=length))

      def generate_date(format_type="date", constraints=None):
          """
          Generate dates in various formats with optional constraints.
          Supports: date, date-time, time, email, uri, uuid, ipv4, ipv6, etc.
          """
          # Handle date range constraints if provided
          days_back = 365
          if constraints and isinstance(constraints, dict):
              if "years_count" in constraints:
                  days_back = constraints["years_count"] * 365
              elif "start" in constraints and "end" in constraints:
                  # Use specific date range
                  pass

          if format_type == "date":
              date = datetime.now() - timedelta(days=random.randint(0, days_back))
              return date.strftime("%Y-%m-%d")
          elif format_type == "date-time":
              date = datetime.now() - timedelta(days=random.randint(0, days_back))
              return date.isoformat()
          elif format_type == "time":
              return f"{random.randint(0,23):02d}:{random.randint(0,59):02d}:{random.randint(0,59):02d}"
          elif format_type == "email":
              return f"user{random.randint(1,9999)}@example.com"
          elif format_type == "uri" or format_type == "url":
              return f"https://example.com/resource/{random.randint(1,9999)}"
          elif format_type == "uuid":
              import uuid
              return str(uuid.uuid4())
          elif format_type == "ipv4":
              return f"{random.randint(1,255)}.{random.randint(0,255)}.{random.randint(0,255)}.{random.randint(1,255)}"
          elif format_type == "ipv6":
              return ":".join([f"{random.randint(0,65535):x}" for _ in range(8)])
          else:
              return datetime.now().strftime("%Y-%m-%d")

      def generate_field_value(field_name, field_meta, constraints):
          """
          Dynamically generate field values for ANY schema field type.
          Handles: string, number, integer, boolean, object, array, null, oneOf, anyOf, allOf
          """
          # Check user constraints first
          if field_name in constraints:
              constraint = constraints[field_name]
              if isinstance(constraint, dict) and "min" in constraint:
                  # Range constraint for numeric fields
                  min_val = constraint["min"]
                  max_val = constraint["max"]
                  # Determine if integer or float based on values
                  if isinstance(min_val, int) and isinstance(max_val, int):
                      return random.randint(min_val, max_val)
                  else:
                      return round(random.uniform(float(min_val), float(max_val)), 2)
              elif isinstance(constraint, list):
                  # Multiple possible values - choose one
                  return random.choice(constraint)
              else:
                  # Specific value
                  return constraint

          # Generate based on schema
          field_type = field_meta.get("type")
          validation = field_meta.get("validation", {})

          # Handle oneOf/anyOf - select one option randomly
          if "oneOf" in field_meta:
              selected_option = random.choice(field_meta["oneOf"])
              return generate_field_value(field_name, selected_option, constraints)

          if "anyOf" in field_meta:
              selected_option = random.choice(field_meta["anyOf"])
              return generate_field_value(field_name, selected_option, constraints)

          # Handle const values (JSON Schema keyword for constant values)
          if "const" in validation:
              return validation["const"]

          # Handle enum values
          if "enum" in validation:
              return random.choice(validation["enum"])

          # Handle null type
          if field_type == "null":
              return None

          # Handle array of types (e.g., ["string", "null"])
          if isinstance(field_type, list):
              # Choose a non-null type if available, otherwise pick randomly
              non_null_types = [t for t in field_type if t != "null"]
              if non_null_types:
                  field_type = random.choice(non_null_types)
              else:
                  return None

          if field_type == "string":
              if "pattern" in validation:
                  return generate_string_with_pattern(validation["pattern"])
              elif "format" in validation:
                  return generate_date(validation["format"], constraints)
              else:
                  min_len = validation.get("minLength", 5)
                  max_len = validation.get("maxLength", 20)
                  # Ensure max_len is at least min_len
                  max_len = max(min_len, max_len)
                  length = random.randint(min_len, min(max_len, 50))
                  # Generate more realistic strings based on field name
                  chars = string.ascii_letters + string.digits
                  return ''.join(random.choices(chars, k=length))

          elif field_type in ["integer", "number"]:
              # Handle minimum/maximum with exclusive variants
              min_val = validation.get("minimum", 0)
              max_val = validation.get("maximum", 100)
              exclusive_min = validation.get("exclusiveMinimum")
              exclusive_max = validation.get("exclusiveMaximum")

              if exclusive_min is not None:
                  min_val = exclusive_min + (0.01 if field_type == "number" else 1)
              if exclusive_max is not None:
                  max_val = exclusive_max - (0.01 if field_type == "number" else 1)

              # Handle multipleOf constraint
              multiple_of = validation.get("multipleOf")

              if field_type == "integer":
                  value = random.randint(int(min_val), int(max_val))
                  if multiple_of:
                      # Adjust to nearest multiple
                      value = round(value / multiple_of) * multiple_of
                      value = max(int(min_val), min(int(max_val), value))
                  return int(value)
              else:
                  value = random.uniform(min_val, max_val)
                  if multiple_of:
                      # Adjust to nearest multiple
                      value = round(value / multiple_of) * multiple_of
                      value = max(min_val, min(max_val, value))
                  return round(value, 2)

          elif field_type == "boolean":
              return random.choice([True, False])

          elif field_type == "array":
              items_schema = validation.get("items", {})
              min_items = validation.get("minItems", 1)
              max_items = validation.get("maxItems", 5)
              count = random.randint(min_items, max_items)
              unique_items = validation.get("uniqueItems", False)

              # Generate array items
              items = []
              for idx in range(count):
