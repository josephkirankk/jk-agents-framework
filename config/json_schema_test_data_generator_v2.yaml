      You: "**Parsed Requirements:** 1. Record Count - 100 students..." ← WRONG! This is text!

      IF YOU WRITE ANY TEXT INSTEAD OF CALLING THE TOOL, YOU HAVE FAILED YOUR TASK.

      The Python code should return a JSON object matching this structure:
      {
        "record_count": 100,
        "field_constraints": {...},
        "extracted_terms": {...}
      }

      ## Input Examples

      Users can provide requirements in various natural language formats:
      - "Create [N] records with [field_name] between [min] and [max]"
      - "Generate [N] records where [field_name] is [value]"
      - "Produce [N] records with [field_name] ranging from [min] to [max]"
      - "Create [N] records for the last [X] years/months/days"

      The parser dynamically extracts constraints without assuming specific field names or domains.

      ## Extraction Tasks

      **IMMEDIATELY call run_python_code** with regex and NLP to extract:
      
      1. **Record Count**: Number of records to generate
         - Patterns: "(\d+) records", "generate (\d+)", "create (\d+)"
         - Default: 100 if not specified
      
      2. **Field Values**: Specific values for any field
         - Patterns: "for <field> <value>", "<field> is <value>", "where <field> equals <value>"
         - Dynamically identifies field names from the user's natural language input

      3. **Value Ranges**: Min/max for numeric fields
         - Patterns: "between (\d+) and (\d+)", "from (\d+) to (\d+)", "(\d+)-(\d+)", "range (\d+) to (\d+)"
         - Applies to any numeric field mentioned in the requirement

      4. **Enum Selections**: Specific enum values
         - Dynamically extracts field names and matches to enum values from the schema
         - No assumptions about specific enum types or domains

      5. **Array Constraints**: For array fields
         - Patterns: "with <field> <list>", "including <items>", "<field> contains <items>"
         - Adapts to any array field defined in the schema

      ## Output Format
      
      Return a JSON object:
      ```json
      {
        "record_count": 100,
        "field_constraints": {
          "any_field_name": "specific_value",
          "any_numeric_field": {"min": 1, "max": 100},
          "any_array_field": ["item1", "item2"],
          "any_date_field": {"start": "2020-01-01", "end": "2024-12-31"}
        },
        "extracted_terms": {
          "identified_field_values": ["value1", "value2"],
          "time_ranges": {"years": 5, "months": 12},
          "sort_order": "ascending|descending"
        }
      }
      ```

      ## Python Code Structure

      ```python
      import re
      import json

      # Extract requirement from user input
      requirement = '''PASTE_USER_REQUIREMENT_HERE'''

      constraints = {
          "record_count": 100,  # default
          "field_constraints": {},
          "extracted_terms": {}
      }

      # Extract record count
      count_match = re.search(r'(\d+)\s*records?', requirement, re.IGNORECASE)
      if count_match:
          constraints["record_count"] = int(count_match.group(1))

      # Extract time-based patterns (generic: years, months, days, weeks)
      time_patterns = [
          (r'last\s+(\d+)\s+years?', 'years', 365),
          (r'last\s+(\d+)\s+months?', 'months', 30),
          (r'last\s+(\d+)\s+weeks?', 'weeks', 7),
          (r'last\s+(\d+)\s+days?', 'days', 1)
      ]

      for pattern, unit, days_multiplier in time_patterns:
          match = re.search(pattern, requirement, re.IGNORECASE)
          if match:
              count = int(match.group(1))
              constraints["extracted_terms"][f"{unit}_count"] = count
              constraints["extracted_terms"]["days_back"] = count * days_multiplier
              # If no explicit record count, use time count
              if not count_match:
                  constraints["record_count"] = count
              break

      # Extract value ranges (e.g., "between 100 and 1000", "from 100 to 1000", "100 to 1000")
      # Dynamically identify the field name from context
      range_pattern = r'(\w+(?:\s+\w+)?)\s+(?:between|from|range|ranging)\s+(\d+(?:\.\d+)?)\s+(?:and|to)\s+(\d+(?:\.\d+)?)'
      range_matches = re.findall(range_pattern, requirement, re.IGNORECASE)
      if range_matches:
          for field_hint, min_val, max_val in range_matches:
              # Use the extracted field hint as a key
              field_key = field_hint.strip().lower().replace(' ', '_')
              constraints["field_constraints"][field_key] = {
                  "min": float(min_val),
                  "max": float(max_val)
              }
              constraints["extracted_terms"][field_key] = {"min": float(min_val), "max": float(max_val)}

      # Extract specific field-value pairs (e.g., "field_name is value", "for field_name value")
      # Pattern: "for <field> <value>" or "<field> is <value>"
      field_value_pattern = r'(?:for|where|with)\s+(\w+(?:\s+\w+)?)\s+(?:is|equals?|=)?\s*([A-Za-z0-9_\-\.]+)'
      field_value_matches = re.findall(field_value_pattern, requirement, re.IGNORECASE)
      if field_value_matches:
          for field_name, value in field_value_matches:
              field_key = field_name.strip().lower().replace(' ', '_')
              constraints["field_constraints"][field_key] = value.strip()
              if field_key not in constraints["extracted_terms"]:
                  constraints["extracted_terms"][field_key] = []
              if isinstance(constraints["extracted_terms"][field_key], list):
                  constraints["extracted_terms"][field_key].append(value.strip())

      # Extract list/array constraints (e.g., "with items A, B, C" or "including X and Y")
      list_pattern = r'(?:with|including|contains?)\s+(?:items?\s+)?([A-Za-z0-9_\-,\s]+(?:,\s*(?:and\s+)?[A-Za-z0-9_\-]+)*)'
      list_matches = re.findall(list_pattern, requirement, re.IGNORECASE)
      if list_matches:
          for match in list_matches:
              # Split by comma or "and"
              items = re.split(r',\s*(?:and\s+)?|\s+and\s+', match)
              items = [item.strip() for item in items if item.strip()]
              if items:
                  constraints["extracted_terms"]["list_items"] = items

      # Extract sorting/ordering patterns
      if 'ascending' in requirement.lower():
          constraints["extracted_terms"]["sort_order"] = "ascending"
      elif 'descending' in requirement.lower():
          constraints["extracted_terms"]["sort_order"] = "descending"

      # Extract boolean flags (e.g., "with unique values", "allow duplicates")
      if 'unique' in requirement.lower():
          constraints["extracted_terms"]["unique_items"] = True
      if 'duplicate' in requirement.lower():
          constraints["extracted_terms"]["allow_duplicates"] = True

      # Return constraints as JSON
      constraints
      ```

