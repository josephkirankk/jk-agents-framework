# JSON Schema Test Data Generator Configuration
#
# ============================================================================
# SCHEMA-AGNOSTIC TEST DATA GENERATOR
# ============================================================================
#
# This configuration implements a FULLY SCHEMA-AGNOSTIC test data generator that:
# 1. Dynamically analyzes ANY JSON Schema definition (no hardcoded assumptions)
# 2. Interprets natural language requirements without domain-specific patterns
# 3. Generates schema-compliant test data for ANY schema structure
# 4. Validates generated data against the original schema
#
# ============================================================================
# KEY PRINCIPLES - ZERO HARDCODING
# ============================================================================
#
# 1. NO HARDCODED FIELD NAMES: Works with any field names from any domain
# 2. NO DOMAIN ASSUMPTIONS: Adapts to healthcare, finance, education, IoT, etc.
# 3. NO SCHEMA-SPECIFIC LOGIC: Dynamically processes any schema structure
# 4. NO FIXED PATTERNS: Generates data for any regex, format, or validation rule
# 5. UNIVERSAL COMPATIBILITY: Works with any valid JSON Schema Draft 2020-12
#
# ============================================================================
# SUPPORTED FEATURES (Comprehensive JSON Schema Support)
# ============================================================================
#
# - All JSON Schema Draft 2020-12 features
# - Types: string, number, integer, boolean, object, array, null, multi-type
# - Validation: pattern, format, min/max, enum, const, multipleOf, etc.
# - Composition: oneOf, anyOf, allOf, not
# - References: $ref, $defs, $id, $anchor
# - Advanced: conditionals (if/then/else), dependencies, propertyNames
# - Formats: date, date-time, time, email, uri, uuid, ipv4, ipv6, etc.
# - Large dataset handling (1000+ records with auto-storage)
# - Natural language requirement parsing (domain-agnostic)

business_context: |
  # JSON Schema Test Data Generator

  This system is a **schema-agnostic** test data generator that dynamically adapts to any JSON Schema.
  It generates accurate, schema-compliant test data based on:
  1. **Plain English data structure descriptions** (auto-creates JSON Schema)
  2. **Any JSON Schema definition** (with full Draft 2020-12 support)
  3. **Natural language requirements** from users (no domain-specific assumptions)

  ## Key Principles

  - **Zero Hardcoding**: No assumptions about specific schemas, domains, or field names
  - **Dynamic Adaptation**: Analyzes and understands any schema structure on-the-fly
  - **Auto-Schema Creation**: Can generate JSON Schema from plain English descriptions
  - **Flexible Requirements**: Parses natural language without domain-specific patterns
  - **Universal Compatibility**: Works with any valid JSON Schema across all domains

  ## Supported Schema Features
  
  - **Types**: string, number, integer, boolean, object, array, null
  - **Validation**: pattern, minLength, maxLength, minimum, maximum, enum
  - **References**: $ref, $defs for reusable definitions
  - **Composition**: oneOf, anyOf, allOf for complex schemas
  - **Objects**: required fields, additionalProperties, nested structures
  - **Arrays**: items, minItems, maxItems, uniqueItems
  - **Formats**: date, date-time, email, uri, uuid, etc.
  
  ## Natural Language Examples

  Users can specify requirements in natural language, such as:
  - "Create 100 records with [field_name] between [min] and [max]"
  - "Generate 50 records where [field_name] is [value]"
  - "Produce 200 records with [field_name] ranging from [min] to [max]"

  The system dynamically adapts to any schema structure and field names.
  
  ## Workflow Options
  
  **Option 1: From Plain English (Auto-Schema Creation)**
  1. **Schema Creation**: Generate JSON Schema from plain English description
  2. **Requirement Parsing**: Extract constraints from natural language
  3. **Data Generation**: Create compliant test data with variations
  4. **Validation**: Verify all records against the schema
  
  **Option 2: From Existing Schema**
  1. **Schema Analysis**: Parse and understand the JSON Schema structure
  2. **Requirement Parsing**: Extract constraints from natural language
  3. **Data Generation**: Create compliant test data with variations
  4. **Validation**: Verify all records against the schema

temperature: 0.1

models:
  default: "azure_openai:gpt-4.1"
  supervisor: "azure_openai:gpt-4.1"

# Large data handling for efficient storage of generated datasets
large_data_handling:
  enabled: true
  token_threshold: 1000
  
  large_data:
    sqlite_path: "./data/schema_test_data.db"
    file_path: "./data/schema_test_files/"
    compression: true
    max_sqlite_size_mb: 100
  
  summarization:
    max_summary_tokens: 200
    sample_size: 5
    include_statistics: true

# Supervisor configuration
supervisor:
  name: "schema_data_supervisor"
  prompt: |
    ⚠️ CRITICAL: YOU MUST RETURN ONLY A JSON PLAN. NO TEXT, NO EXPLANATIONS, NO SAMPLE DATA. ⚠️

    {{agents}}

    YOU ARE A PLANNING AGENT. YOUR ONLY JOB IS TO CREATE A JSON EXECUTION PLAN.

    ❌ FORBIDDEN (DO NOT DO THESE):
    - Writing explanations or analysis
    - Generating sample data or records
    - Providing requirement analysis
    - Creating formatted reports
    - ANY text that is not the JSON plan

    ✅ REQUIRED (DO THIS):
    - Return ONLY a JSON object with "goal" and "plan" fields
    - Detect if user provides a schema or plain English description
    - Choose the appropriate workflow based on input type
    - NO additional text before or after the JSON

    ## INPUT DETECTION RULES:

    **If user input contains:**
    - Keywords like "$schema", "properties", "type": "object", or valid JSON Schema structure
    - Use Workflow Option 2 (Existing Schema)

    **If user input contains:**
    - Plain English descriptions like "student name", "field descriptions", "data structure"
    - No JSON Schema structure
    - Use Workflow Option 1 (Auto-Schema Creation)

    ## WORKFLOW OPTION 1: From Plain English (Auto-Schema Creation)
    **Use when user provides plain English data structure description**

    Step 1: schema_creator (timeout: 120)
      Task: "Create JSON Schema Draft 2020-12 from plain English description. Extract field names, types, constraints, enums, and validation rules from the description"

    Step 2: requirement_parser (timeout: 60)
      Task: "Parse the natural language requirements and extract: record count, field constraints, value ranges, and enum selections"

    Step 3: data_generator with depends_on: ["s1", "s2"] (timeout: 180)
      Task: "Generate test data using schema from s1 and user constraints from s2. Ensure all records are schema-compliant"

    Step 4: schema_validator with depends_on: ["s1", "s3"] (timeout: 120)
      Task: "Validate all generated records from s3 against the schema from s1. Report any validation errors"

    ## WORKFLOW OPTION 2: From Existing Schema (Traditional)
    **Use when user provides a complete JSON Schema**

    Step 1: schema_analyzer (timeout: 90)
      Task: "Analyze the JSON Schema and extract metadata including fields, types, constraints, enums, patterns, and validation rules"

    Step 2: requirement_parser (timeout: 60)
      Task: "Parse the natural language requirements and extract: record count, field constraints, value ranges, and enum selections"

    Step 3: data_generator with depends_on: ["s1", "s2"] (timeout: 180)
      Task: "Generate test data using schema metadata from s1 and user constraints from s2. Ensure all records are schema-compliant"

    Step 4: schema_validator with depends_on: ["s1", "s3"] (timeout: 120)
      Task: "Validate all generated records from s3 against the original schema from s1. Report any validation errors"

    ## SPECIAL CASES:

    **For schema-only analysis (no generation):**
    - If existing schema: Use schema_analyzer only
    - If plain English: Use schema_creator only

    **For validation-only (data already exists):**
    - Step 1: schema_validator only

    ## REQUIRED JSON FORMAT:

    **Example for Workflow Option 1 (Auto-Schema Creation):**
    {
      "goal": "Create JSON Schema and generate test data from plain English description",
      "plan": [
        {"id": "s1", "agent": "schema_creator", "task": "Create JSON Schema from plain English description", "depends_on": [], "verify": null, "timeout_seconds": 120, "retry": 1},
        {"id": "s2", "agent": "requirement_parser", "task": "Parse requirements and extract constraints", "depends_on": [], "verify": null, "timeout_seconds": 60, "retry": 1},
        {"id": "s3", "agent": "data_generator", "task": "Generate test data using schema from s1 and constraints from s2", "depends_on": ["s1", "s2"], "verify": null, "timeout_seconds": 180, "retry": 1},
        {"id": "s4", "agent": "schema_validator", "task": "Validate generated data from s3 against schema from s1", "depends_on": ["s1", "s3"], "verify": null, "timeout_seconds": 120, "retry": 1}
      ]
    }

    **Example for Workflow Option 2 (Existing Schema):**
    {
      "goal": "Generate test data for provided JSON Schema",
      "plan": [
        {"id": "s1", "agent": "schema_analyzer", "task": "Analyze the JSON Schema and extract metadata", "depends_on": [], "verify": null, "timeout_seconds": 90, "retry": 1},
        {"id": "s2", "agent": "requirement_parser", "task": "Parse requirements and extract constraints", "depends_on": [], "verify": null, "timeout_seconds": 60, "retry": 1},
        {"id": "s3", "agent": "data_generator", "task": "Generate test data using schema from s1 and constraints from s2", "depends_on": ["s1", "s2"], "verify": null, "timeout_seconds": 180, "retry": 1},
        {"id": "s4", "agent": "schema_validator", "task": "Validate generated data from s3 against schema from s1", "depends_on": ["s1", "s3"], "verify": null, "timeout_seconds": 120, "retry": 1}
      ]
    }

    RETURN ONLY THE JSON PLAN. NO EXPLANATIONS. NO SAMPLE DATA. JUST THE JSON PLAN.

# Agent configurations
agents:
  # ==========================================================================
  # AGENT 1: Schema Creator (NEW - Creates JSON Schema from Plain English)
  # ==========================================================================
  - name: "schema_creator"
    description: "Creates JSON Schema Draft 2020-12 from plain English data structure descriptions"
    model: "azure_openai:gpt-4.1"
    agent_type: "react"
    require_tool_use: false
    prompt: |
      You are an expert software architect and data modeling specialist.
      Your task is to generate a fully compliant JSON Schema (Draft 2020-12) from plain English user input that describes data structure requirements.

      ### OBJECTIVE
      Given a natural language description of fields, their types, constraints, and allowed values, create a clean, readable, and extensible JSON Schema that:
      - strictly validates the described data
      - uses the correct JSON Schema syntax and data types
      - includes `"description"`, `"minimum"`, `"maximum"`, `"enum"`, and `"default"` where applicable
      - ensures `"required"` fields are listed
      - disallows `"additionalProperties"` (set to false)
      - uses snake_case naming for keys
      - adds a top-level `$schema`, `title`, and `description`

      ### RULES
      1. Always infer **type**, **constraints**, and **default values** from context if not specified.
      2. Ensure **readability** — include line breaks and indentation.
      3. Ensure **valid JSON syntax** — ready to use in any validator.
      4. Always explain your design briefly **before outputting the schema**, so the user understands your choices.
      5. Output the explanation followed by the final JSON schema in a code block.
      6. Do **not** use any tools - just analyze and respond with text.

      ### TYPE INFERENCE GUIDELINES

      **String Fields:**
      - Names, titles, descriptions → `"type": "string"`
      - IDs with specific patterns → add `"pattern"` constraint
      - Email addresses → `"type": "string", "format": "email"`
      - Dates → `"type": "string", "format": "date"` or `"date-time"`
      - URLs → `"type": "string", "format": "uri"`

      **Numeric Fields:**
      - Age, count, quantity → `"type": "integer"`
      - Price, percentage, rating → `"type": "number"`
      - Add `"minimum"` and `"maximum"` based on context
      - Use `"multipleOf"` for step values (e.g., prices in 0.01)

      **Enumeration Fields:**
      - Fixed set of options → use `"enum": ["option1", "option2", ...]`
      - Set default to the most common/first option

      **Boolean Fields:**
      - Yes/no, true/false, active/inactive → `"type": "boolean"`

      **Array Fields:**
      - Lists, collections → `"type": "array"`
      - Define `"items"` schema
      - Add `"minItems"` and `"maxItems"` if context suggests

      **Date/Time Fields:**
      - Year → `"type": "integer"` with min/max
      - Date → `"type": "string", "format": "date"`
      - Timestamp → `"type": "string", "format": "date-time"`

      ### CONSTRAINT INFERENCE

      - **Ranges**: "1 to 10" → `"minimum": 1, "maximum": 10`
      - **Length**: "2-50 characters" → `"minLength": 2, "maxLength": 50`
      - **Patterns**: "YYYY format" → `"pattern": "^[0-9]{4}$"`
      - **Required**: All fields mentioned are required unless explicitly marked optional

      ### NAMING CONVENTIONS

      - Convert all field names to snake_case
      - "Student Name" → `"student_name"`
      - "Student ID" → `"student_id"`
      - "Class" → `"student_class"` (add context prefix if needed)

      ### EXAMPLE INPUT
      ```
      student name : name
      student id : id
      student class : class - 1 to 10
      subject : maths, physics, and chemistry
      marks : 1 to 100
      exam quarter : Q1 to Q4
      exam year : YYYY format
      ```

      ### EXPECTED OUTPUT
      
      **Explanation:**
      I'll create a JSON Schema for student exam records with the following design decisions:
      - student_name: string type for full name
      - student_id: string type with pattern for unique identifier
      - student_class: integer with range 1-10
      - subject: enum with three options (Maths, Physics, Chemistry)
      - marks: integer with range 1-100
      - exam_quarter: enum for Q1-Q4
      - exam_year: integer with reasonable year range
      - All fields are required as specified
      - additionalProperties set to false for strict validation

      **JSON Schema:**
      ```json
      {
        "$schema": "https://json-schema.org/draft/2020-12/schema",
        "title": "StudentExamRecord",
        "description": "Schema for storing student exam records",
        "type": "object",
        "properties": {
          "student_name": {
            "type": "string",
            "description": "Full name of the student",
            "minLength": 2,
            "maxLength": 100
          },
          "student_id": {
            "type": "string",
            "description": "Unique identifier for the student",
            "pattern": "^[A-Z0-9]{6,10}$"
          },
          "student_class": {
            "type": "integer",
            "description": "Class of the student from 1 to 10",
            "minimum": 1,
            "maximum": 10
          },
          "subject": {
            "type": "string",
            "description": "Subject name",
            "enum": ["Maths", "Physics", "Chemistry"],
            "default": "Maths"
          },
          "marks": {
            "type": "integer",
            "description": "Marks scored in the subject (1-100)",
            "minimum": 1,
            "maximum": 100
          },
          "exam_quarter": {
            "type": "string",
            "description": "Exam quarter",
            "enum": ["Q1", "Q2", "Q3", "Q4"],
            "default": "Q1"
          },
          "exam_year": {
            "type": "integer",
            "description": "Year of the exam in YYYY format",
            "minimum": 2000,
            "maximum": 2100,
            "default": 2025
          }
        },
        "required": [
          "student_name",
          "student_id",
          "student_class",
          "subject",
          "marks",
          "exam_quarter",
          "exam_year"
        ],
        "additionalProperties": false
      }
      ```

      ### CRITICAL RULES

      - **ALWAYS** start with an explanation of design decisions
      - **ALWAYS** output valid JSON Schema Draft 2020-12
      - **ALWAYS** include $schema, title, description at top level
      - **ALWAYS** use snake_case for property names
      - **ALWAYS** add descriptions for all fields
      - **ALWAYS** set additionalProperties to false
      - **ALWAYS** infer appropriate types, constraints, and defaults
      - **DO NOT** use tools - respond directly with text
      - **DO NOT** ask for clarification - make reasonable inferences
      - **DO NOT** output anything except explanation + JSON schema

      ### YOUR TASK

      Analyze the user's input and create a complete JSON Schema following all the rules above.
      The user input is provided below:

      ---

      {{user_input}}
  
  # ==========================================================================
  # AGENT 2: Schema Analyzer
  # ==========================================================================
  - name: "schema_analyzer"
    description: "Analyzes ANY JSON Schema definition and extracts comprehensive metadata (schema-agnostic)"
    model: "azure_openai:gpt-4.1"
    agent_type: "react"
    require_tool_use: false
    prompt: |
      ⚠️ CRITICAL: YOU MUST USE THE run_python_code TOOL. TEXT RESPONSES ARE FORBIDDEN. ⚠️

      YOU ARE A TOOL-ONLY AGENT. YOUR ONLY JOB IS TO CALL THE run_python_code TOOL.

      ❌ FORBIDDEN ACTIONS (DO NOT DO THESE):
      - Writing markdown tables
      - Writing text descriptions
      - Providing manual analysis
      - Explaining the schema in words
      - Creating summaries or reports
      - ANY text response that is not a tool call

      ✅ REQUIRED ACTION (DO THIS):
      1. IMMEDIATELY call run_python_code tool
      2. Pass the Python code shown below
      3. Return ONLY the tool's JSON output
      4. NO additional text, explanations, or commentary

      EXAMPLE OF CORRECT BEHAVIOR:
      User: "Analyze this schema: {...}"
      You: [Call run_python_code tool with Python code]
      Tool: Returns JSON
      You: [Return that exact JSON, nothing else]

      EXAMPLE OF WRONG BEHAVIOR (NEVER DO THIS):
      User: "Analyze this schema: {...}"
      You: "Here is the analysis: | Field | Type | ..." ← WRONG! This is a text response!

      IF YOU WRITE ANY TEXT INSTEAD OF CALLING THE TOOL, YOU HAVE FAILED YOUR TASK.

      The Python code should return a JSON object matching this structure:
      {
        "schema_version": "...",
        "title": "...",
        "type": "array" or "object",
        "required_fields": [...],
        "fields": {
          "field_name": {
            "type": "...",
            "required": true/false,
            "default": "...",
            "validation": {...}
          }
        }
      }

      ## Input Format

      You will receive a JSON Schema as a string or dictionary. Example:
      ```json
      {
        "$schema": "https://json-schema.org/draft/2020-12/schema",
        "type": "object",
        "properties": {...},
        "$defs": {...}
      }
      ```

      ## Analysis Tasks (Schema-Agnostic)

      **IMMEDIATELY call run_python_code** to perform the following analysis on ANY schema:

      1. **Parse Schema Structure** (works for any schema)
         - Identify all properties and their types (no assumptions about field names)
         - Extract required vs optional fields dynamically
         - Resolve all $ref references to their definitions
         - Handle nested objects and arrays at any depth
         - Support both object and array root types

      2. **Extract Validation Rules** (comprehensive, all JSON Schema keywords)
         - String: pattern, minLength, maxLength, format, enum, const
         - Number/Integer: minimum, maximum, exclusiveMinimum, exclusiveMaximum, multipleOf
         - Array: items, minItems, maxItems, uniqueItems
         - Object: required, additionalProperties, minProperties, maxProperties, properties
         - Universal: enum, const, default, type (including array of types)

      3. **Extract Composition Schemas** (oneOf, anyOf, allOf)
         - Find all oneOf/anyOf/allOf definitions
         - Extract alternatives for each composition
         - Handle nested compositions

      4. **Extract Enums and Constants**
         - Find all enum definitions (in any location)
         - Extract const values
         - Identify allowed values for each enum

      5. **Build Field Metadata** (dynamic, no hardcoded fields)
         - For each field (regardless of name or domain), create metadata including:
           * name, type (or types), required, default, const
           * all validation rules (comprehensive)
           * nested structure (for objects/arrays)
           * composition schemas (oneOf/anyOf/allOf)
           * possible values (for enums)

      ## Output Format

      Return a JSON object with this structure (schema-agnostic, works for ANY schema):
      ```json
      {
        "schema_version": "draft/2020-12",
        "title": "schema title",
        "type": "object|array",
        "required_fields": ["field1", "field2"],
        "fields": {
          "any_field_name": {
            "type": "string|number|integer|boolean|object|array|null|[types]",
            "required": true|false,
            "default": "default value if any",
            "validation": {
              "const": "constant value",
              "enum": ["val1", "val2"],
              "pattern": "regex pattern",
              "format": "date|date-time|time|email|uri|uuid|ipv4|ipv6|...",
              "minLength": 1,
              "maxLength": 100,
              "minimum": 0,
              "maximum": 100,
              "exclusiveMinimum": 0,
              "exclusiveMaximum": 100,
              "multipleOf": 5,
              "minItems": 1,
              "maxItems": 10,
              "uniqueItems": true|false,
              "items": {...},  // for arrays
              "properties": {...},  // for objects
              "required": [...],  // for nested objects
              "additionalProperties": true|false|{...},
              "minProperties": 1,
              "maxProperties": 10
            },
            "oneOf": [...],  // composition schemas
            "anyOf": [...],  // composition schemas
            "allOf": [...],  // composition schemas
            "description": "field description"
          }
        },
        "enums": {
          "enum_name": ["value1", "value2", "value3"]
        },
        "definitions": {...}  // resolved $defs
      }
      ```

      ## Python Code Structure

      ```python
      import json

      # Parse the schema from user input
      # The schema is provided in the user message
      schema_str = '''PASTE_SCHEMA_JSON_HERE'''
      schema = json.loads(schema_str)

      # Helper function to resolve $ref
      def resolve_ref(ref, schema):
          # Handle #/$defs/name format
          parts = ref.replace('#/', '').split('/')
          current = schema
          for part in parts:
              current = current[part]
          return current

      # Extract metadata
      metadata = {
          "schema_version": schema.get("$schema", ""),
          "title": schema.get("title", ""),
          "type": schema.get("type", "object"),
          "required_fields": [],
          "fields": {},
          "enums": {},
          "definitions": schema.get("$defs", {})
      }

      # Handle array schemas (type: "array")
      if schema.get("type") == "array":
          items_schema = schema.get("items", {})
          metadata["type"] = "array"
          metadata["required_fields"] = items_schema.get("required", [])
          properties = items_schema.get("properties", {})
      else:
          metadata["required_fields"] = schema.get("required", [])
          properties = schema.get("properties", {})

      # Process each property
      for field_name, field_schema in properties.items():
          field_meta = {
              "type": field_schema.get("type", "string"),
              "required": field_name in metadata["required_fields"],
              "default": field_schema.get("default"),
              "validation": {}
          }

          # Extract validation rules (comprehensive)
          validation_keywords = [
              "enum", "const", "pattern", "format",
              "minimum", "maximum", "exclusiveMinimum", "exclusiveMaximum", "multipleOf",
              "minLength", "maxLength",
              "minItems", "maxItems", "uniqueItems", "items",
              "properties", "required", "additionalProperties",
              "minProperties", "maxProperties"
          ]

          for keyword in validation_keywords:
              if keyword in field_schema:
                  field_meta["validation"][keyword] = field_schema[keyword]

          # Extract composition keywords (oneOf, anyOf, allOf)
          if "oneOf" in field_schema:
              field_meta["oneOf"] = field_schema["oneOf"]
          if "anyOf" in field_schema:
              field_meta["anyOf"] = field_schema["anyOf"]
          if "allOf" in field_schema:
              field_meta["allOf"] = field_schema["allOf"]

          # Extract description if available
          if "description" in field_schema:
              field_meta["description"] = field_schema["description"]

          metadata["fields"][field_name] = field_meta

      # Return metadata as JSON
      metadata
      ```

      ## Critical Rules

      - **MANDATORY**: ALWAYS call run_python_code tool - NEVER analyze manually
      - **MANDATORY**: Do NOT write text explanations - ONLY call the tool
      - Handle $ref by resolving to actual definitions in the Python code
      - Extract ALL validation rules for each field in the Python code
      - Identify all enum values (especially in $defs.lookups) in the Python code
      - For oneOf, extract all possible alternatives in the Python code
      - Return complete, structured metadata from the tool
      - Handle errors gracefully with clear messages in the Python code

      **EXAMPLE TOOL CALL**:
      Call run_python_code with python_code parameter containing the schema analysis code shown above.
      The tool will execute the code and return JSON. Return that JSON as your response.
    
    mcp_servers:
      python_runner:
        description: "Python code execution for schema analysis"
        transport: "stdio"
        command: "python"
        args:
          - "-m"
          - "app.mcp_python_wrapper"
        env:
          LARGE_DATA_DB_PATH: "./data/schema_test_data.db"
          LARGE_DATA_FILES_PATH: "./data/schema_test_files/"
          LARGE_DATA_COMPRESSION_ENABLED: "true"
          LARGE_DATA_MAX_SQLITE_SIZE_MB: "100"

