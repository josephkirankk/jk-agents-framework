# ============================================================================
# CUSTOM OPENAI ENDPOINT CONFIGURATION EXAMPLE
# ============================================================================
# This example demonstrates how to use custom OpenAI-compatible endpoints
# (like LM Studio, PepGenX wrapper, or other OpenAI-compatible services)
# alongside standard providers in JK-Agents.
#
# SETUP FOR CUSTOM ENDPOINTS:
# 1. Set environment variables for your custom endpoint:
#    OPENAI_BASE_URL=http://127.0.0.1:8080/v1  # Your custom endpoint
#    OPENAI_API_KEY=your-custom-api-key        # Your custom API key
#
# 2. The custom endpoint must be OpenAI-compatible (support /v1/chat/completions)
#
# 3. Use standard "openai:" prefix - JK-Agents will automatically use
#    the custom base URL if OPENAI_BASE_URL is set
# ============================================================================

models:
  # Custom OpenAI-compatible endpoint (will use OPENAI_BASE_URL if set)
  default: "openai:gpt-4"
  supervisor: "openai:gpt-4"

  # Standard providers as fallbacks
  azure_fallback: "azure_openai:gpt-4.1"
  google_fallback: "google:gemini-2.0-flash-exp"

  temperature: 0.1

business_context: |
  You are an AI system that can use custom OpenAI-compatible endpoints
  alongside standard providers. This allows integration with services like
  LM Studio, custom wrappers, or other OpenAI-compatible APIs.

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: "openai:google/gemma-3-12b"  # Will use custom endpoint if configured
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}
    
    You are a supervisor that creates execution plans using available agents.
    Use python agent for any math or computation.
    Use human_response_agent as the final agent to verify the results and provide the output.
    Available agents:
    {{agents}}
    
    Create a JSON plan with steps that can run in parallel where possible.
    Each step should specify the most appropriate agent for the task.
    
    Return only JSON, with top-level object:
    {
      "goal": "<short restatement of user goal>",
      "plan": [
        {"id":"s1", "agent":"A", "task":"...", "depends_on":[], "verify":"...", "timeout_seconds":60, "retry":2},
        ...
      ]
    }
    
    Respond with JSON only and nothing else.

agents:
  # Agents using custom OpenAI endpoint
  - name: "custom_assistant"
    description: "General purpose assistant using custom OpenAI endpoint"
    model: "openai:google/gemma-3-12b"
    prompt: |
      You are a helpful AI assistant.
      Provide accurate, helpful responses to user questions.
      Be concise and professional in your communication.
    mcp_servers: {}

  
  - name: "human_response_agent"
    description: "Final response formatter"
    model: "openai:gpt-4"  # Will use custom endpoint
    prompt: |
      {{dependent_request_responses}}
      
      Present a clear, natural answer based on the previous agent responses.
      Format the information in a user-friendly way without revealing internal processes.
    mcp_servers: {}

  - name: "python_exec_agent"
    description: "Has Python code creation and execution capabilities"
    model: "openai:qwen/qwen3-4b-thinking-2507"
    prompt: |
      {{dependent_request_responses}}

      You are CodeRunner. You MUST write and execute Python code using the run_python_code tool for any computational task.

      if the task can be done using python, you MUST use the run_python_code tool.
      Think step by step and write the python code first, then execute it using the tool.

      CRITICAL RULES:
      - ALWAYS use the run_python_code tool - never just describe what you would do
      - Write the Python code first, then execute it using the tool
      - Show both the code (```python ... ```) and the actual execution result
      - Use previous step data as input when appropriate
      - Prefer standard library, avoid network or file side effects
      - If execution fails, fix the code and retry once

      Always execute the code using the tool and return the result.

      Available MCP servers: {{mcpservers}}

      Remember: You must actually execute the code using the available tool, not just pretend to do it!
    mcp_servers:
      python_runner:
        description: "Run Python code via Deno + @pydantic/mcp-run-python (stdio)"
        transport: "stdio"
        command: "deno"
        args:
          - "run"
          - "-N"
          - "-R=node_modules"
          - "-W=node_modules"
          - "--node-modules-dir=auto"
          - "jsr:@pydantic/mcp-run-python"
          - "stdio"


  - name: "simple_python_exec_agent"
    description: "Has Python code creation and execution capabilities"
    model: "openai:qwen/qwen3-4b-2507"
    prompt: |
      {{dependent_request_responses}}
      Your task is the understand the question and write the code for the question and execute it using the tool. only think on how to write the code, write the code and execute the code using the tool.
      
    mcp_servers:
      python_runner:
        description: "Run Python code via Deno + @pydantic/mcp-run-python (stdio)"
        transport: "stdio"
        command: "deno"
        args:
          - "run"
          - "-N"
          - "-R=node_modules"
          - "-W=node_modules"
          - "--node-modules-dir=auto"
          - "jsr:@pydantic/mcp-run-python"
          - "stdio"