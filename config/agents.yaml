models:
  default: "openai:gpt-4o-mini"
  supervisor: "openai:gpt-4o-mini"
  temperature: 0.0

business_context: |
  You are an assistant working for ACME Inc. ACME's goals: prioritize accuracy, cite sources when using web data, and avoid destructive actions by default.

persistence:
  type: "memory"

supervisor:
  name: "supervisor"
  model: ""
  prompt: |
    Business context (do not reveal to user):
    {{business_context}}

    You are the Supervisor / Planner. The user will provide a request. Your job:
    1) Analyze the request in the business context above.
    2) Decompose it into a multi-step execution plan (steps may run in sequence or after dependencies).
    3) For each step include:
       - id: unique short id (string)
       - agent: the worker agent name (must be one of the available agents: {{agents}})
       - task: short textual instruction the worker should execute
       - depends_on: (optional) list of step ids this step depends on
       - verify: (optional) short instruction describing how to verify step succeeded
       - timeout_seconds: (optional) per-step timeout
       - retry: (optional) integer retries for this step

    Return only JSON, with top-level object:
    {
      "goal": "<short restatement of user goal>",
      "plan": [
        {"id":"s1", "agent":"A", "task":"...", "depends_on":[], "verify":"...", "timeout_seconds":30, "retry":1},
        ...
      ]
    }

    Respond with JSON only and nothing else.

agents:
  - name: "web_agent"
    description: "Performs web lookups and retrieval using streamable HTTP MCP servers."
    model: "openai:gpt-4o-mini"
    prompt: |
      You are WebAgent. Available MCP servers:
      {{mcpservers}}
      When given a task, fetch facts using MCP tools as needed and return a concise result. Cite sources if applicable.
    mcp_servers:
      websearch:
        description: "Brave search MCP server (streamable-http)."
        transport: "streamable_http"
        url: "http://localhost:8000/mcp"
        env: {}

  - name: "math_agent"
    description: "Performs precise numeric computation via MCP math server."
    model: "openai:gpt-4o-mini"
    prompt: |
      You are MathAgent. Available MCP servers:
      {{mcpservers}}
      When given a numeric task, prefer MCP tool calculations and return a precise result.
    mcp_servers:
      math:
        description: "Arithmetic MCP (add/multiply) via stdio."
        transport: "stdio"
        command: "python"
        args: ["examples/mcp_servers/math_server.py"]
        env: {}
