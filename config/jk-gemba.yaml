      - raw_note (string): raw Hinglish or translated English note.
      - machine (string)
      - timestamp (string, "YYYY-MM-DD HH:MM")
      - sensor_snapshot (optional JSON): e.g. {"bearing_temp_C":95,"vibration_rms_mm_s":13.5,"motor_current_A":45,"pressure_bar":120,"notes":"..."}
      - existing_ontology (optional JSON): load of pilger_machine_ontology.json if available

