version: '3.8'

services:
  pepgenx-wrapper:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pepgenx-openai-wrapper
    ports:
      - "8080:8080"
      - "9090:9090"  # Metrics port
    environment:
      # PepGenX API Configuration
      - PEPGENX_API_URL=${PEPGENX_API_URL}
      - PEPGENX_PROJECT_ID=${PEPGENX_PROJECT_ID}
      - PEPGENX_TEAM_ID=${PEPGENX_TEAM_ID}
      - PEPGENX_API_KEY=${PEPGENX_API_KEY}
      
      # OKTA Token Configuration
      - OKTA_TOKEN_FILE=${OKTA_TOKEN_FILE:-okta_token.json}
      
      # OpenAI Wrapper Configuration
      - OPENAI_WRAPPER_API_KEYS=${OPENAI_WRAPPER_API_KEYS}
      - OPENAI_WRAPPER_HOST=0.0.0.0
      - OPENAI_WRAPPER_PORT=8080
      
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      
      # CORS Configuration
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS:-true}
      
      # Rate Limiting
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-10}
      
      # Monitoring
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - METRICS_PORT=9090
      
      # Security
      - SECRET_KEY=${SECRET_KEY}
      
      # Cache Configuration
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - OKTA_TOKEN_REFRESH_THRESHOLD_MINUTES=${OKTA_TOKEN_REFRESH_THRESHOLD_MINUTES:-5}
    
    volumes:
      # Mount OKTA token file
      - ./okta_token.json:/app/okta_token.json:ro
      # Mount logs directory
      - ./logs:/app/logs
      # Mount custom configuration if needed
      - ./.env:/app/.env:ro
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - pepgenx-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: pepgenx-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - pepgenx-network
    profiles:
      - monitoring

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: pepgenx-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - pepgenx-network
    profiles:
      - monitoring

networks:
  pepgenx-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
