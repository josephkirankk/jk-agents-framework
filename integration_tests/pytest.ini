[pytest]
# Pytest configuration for integration tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests (no mocking)
    azure: Requires Azure OpenAI credentials
    google: Requires Google Gemini credentials
    anthropic: Requires Anthropic Claude credentials
    chromadb: Requires ChromaDB
    slow: Slow tests (> 30 seconds)
    api: Requires API server running

# Test output
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Async configuration
asyncio_mode = auto

# Coverage configuration (when using --cov)
[coverage:run]
source = ../app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
